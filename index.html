pp:{eye:"Privacy Policy",title:"Privacy Policy",secs:[
{id:"pp1",h:"1. Who We Are",b:`<p>SYLA AI is operated by <strong>Gökdeniz Çiftçi</strong>, an individual developer residing in Türkiye. Contact: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p><p>For EU/EEA users, Gökdeniz Çiftçi acts as the <strong>Data Controller</strong> under GDPR. For Turkish users, we act as the <strong>Veri Sorumlusu</strong> under KVKK (Law No. 6698).</p><div class="cbox"><p class="cl">Data Controller</p><p class="cn">Gökdeniz Çiftçi</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`},
{id:"pp2",h:"2. What Data We Collect",b:`<h3>2.1 Data You Provide</h3><ul><li>Account information (display name, optional profile details)</li><li>Text messages and conversations with SYLA AI</li><li>Voice recordings when using voice features</li><li>Journal entries and mood data you choose to share</li><li>Payment information (processed by RevenueCat — we do not store card details)</li></ul><h3>2.2 Automatically Collected</h3><ul><li>Device identifiers (Firebase anonymous ID)</li><li>App usage statistics and session duration</li><li>Crash reports and performance diagnostics</li><li>Preferred language and region</li></ul><h3>2.3 AI Memory System</h3><p>SYLA AI uses a three-layer memory system:</p><ul><li><strong>Short-term:</strong> context within the current conversation</li><li><strong>Long-term:</strong> summaries of past conversations stored in your profile</li><li><strong>Preference:</strong> your stated interests, tone preferences, and emotional patterns</li></ul><p>You may request deletion of any or all memory layers at any time (see Section 7).</p>`},
{id:"pp3",h:"3. How We Use Your Data",b:`<ul><li>To provide and operate SYLA AI</li><li>To personalize AI responses using your memory profile</li><li>To process subscriptions and manage your account</li><li>To improve service quality through authorized internal review (see Section 4)</li><li>To send service-related communications (not marketing unless you opt in)</li><li>To comply with legal obligations under Turkish, EU, and applicable international law</li></ul><div class="hl">We do not sell, rent, or trade your personal data to any third party for marketing purposes. Ever.</div>`},
{id:"pp4",h:"4. Internal Data Review",b:`<p>To improve SYLA AI and ensure safe interactions, the developer (Gökdeniz Çiftçi) may review conversation data stored in Firebase/Firestore. This review:</p><ul><li>Is conducted solely for product improvement and safety</li><li>Is performed by the developer only — not shared with third parties</li><li>Is never used for profiling, advertising, or sale of data</li><li>Is subject to strict confidentiality obligations</li></ul><p><strong>Legal basis (GDPR):</strong> Legitimate interest (Article 6(1)(f)) — improving safety and quality of an AI emotional support service.</p><p>You may object to this processing at any time. Upon a valid objection we will cease reviewing your data and delete your records.</p><div class="hl">Right to object: contact gokdenizciftciq@icloud.com at any time.</div>`},
{id:"pp5",h:"5. Third-Party Services",b:`<h3>OpenAI</h3><ul><li>Your messages and voice are transmitted to OpenAI's API to generate responses</li><li>We use API settings that disable training on your data (Zero Data Retention where available)</li><li>Transfers to OpenAI (US) are covered by Standard Contractual Clauses under GDPR</li></ul><h3>Google Firebase / Firestore</h3><ul><li>Authentication, database, and storage. EU users' data stored in EU data centers where possible</li></ul><h3>RevenueCat</h3><ul><li>Subscription management. RevenueCat does not receive your conversation data</li></ul><h3>Apple App Store / Google Play</h3><ul><li>In-app purchases processed by Apple and Google under their own policies</li></ul>`},
{id:"pp6",h:"6. Data Retention",b:`<ul><li>Conversation data: retained while your account is active, deleted 30 days after deletion request</li><li>AI memory profiles: deleted immediately upon request</li><li>Usage analytics: up to 24 months in anonymized form</li><li>Payment records: 5 years as required by Turkish tax law</li></ul>`},
{id:"pp7",h:"7. Your Rights",b:`<p>Under GDPR (EU) and KVKK (Türkiye) you have the right to:</p><ul><li><strong>Access:</strong> request a copy of all data we hold</li><li><strong>Rectification:</strong> correct inaccurate data</li><li><strong>Erasure:</strong> delete your account and all associated data</li><li><strong>Portability:</strong> receive your data in machine-readable format</li><li><strong>Restriction:</strong> limit how we process your data</li><li><strong>Objection:</strong> object to processing based on legitimate interest (including Section 4)</li><li><strong>Withdraw consent:</strong> at any time, without affecting prior processing</li></ul><p>Contact: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> — we respond within 30 days. EU users may contact their national Data Protection Authority. Turkish users may apply to the <strong>Kişisel Verileri Koruma Kurumu (KVKK)</strong>.</p>`},
{id:"pp8",h:"8. Voice Data & Special Categories",b:`<p>Voice recordings may constitute biometric data under certain jurisdictions (including potentially GDPR Article 9). We process voice data only with your explicit consent when you activate voice features. Disable at any time in settings.</p><div class="wl">Voice recordings are transmitted in real time to OpenAI for processing. Do not share sensitive personal, financial, or health information via voice calls.</div>`},
{id:"pp9",h:"9. Children & Minors",b:`<p>SYLA AI is rated 18+. We do not knowingly collect data from users under 13 (COPPA) or under 16 (GDPR Article 8). If we discover an underage user, we will immediately delete their account and all data.</p><p>Parents/guardians: contact <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> if you believe your child has created an account.</p>`},
{id:"pp10",h:"10. Data Security",b:`<ul><li>All data encrypted in transit using TLS 1.2+</li><li>Firebase provides encryption at rest</li><li>Firebase access restricted to authenticated developer accounts only</li><li>Access logs maintained</li></ul><p>In the event of a breach affecting your rights, we will notify you and relevant authorities within 72 hours (GDPR Article 33).</p>`},
{id:"pp11",h:"11. California Users (CCPA)",b:`<p>We do not sell personal information as defined by CCPA. California residents have the right to know what data we collect, request deletion, and opt out of sale (not applicable — we do not sell data). Contact: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p>`},
{id:"pp12",h:"12. Changes to This Policy",b:`<p>We will notify you of material changes via in-app notification at least 14 days before changes take effect. Continued use after the effective date constitutes acceptance.</p>`}
]},

{id:"tos8",h:"8. Termination",b:`<p>We reserve the right to suspend or terminate your account if you violate these Terms. You may delete your account at any time through the App settings or by contacting us. Upon termination, data will be deleted in accordance with the Privacy Policy.</p>`},
{id:"tos9",h:"9. Governing Law & Disputes",b:`<p>These Terms are governed by the laws of the <strong>Republic of Türkiye</strong>. Disputes will first be subject to good-faith negotiation and, if unresolved, to the courts of <strong>Istanbul, Türkiye</strong>, unless the mandatory consumer protection laws of your country of residence require otherwise.</p><p>EU users: your mandatory EU consumer rights are unaffected.</p>`},

{id:"pp1",h:"1. Biz Kimiz",b:`<p>SYLA AI, Türkiye'de ikamet eden bireysel bir geliştirici olan <strong>Gökdeniz Çiftçi</strong> tarafından işletilmektedir. İletişim: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p><p>AB/AEA kullanıcıları için Gökdeniz Çiftçi, GDPR kapsamında <strong>Veri Sorumlusu</strong> sıfatıyla hareket eder. Türkiye'deki kullanıcılar için KVKK (6698 sayılı Kanun) kapsamında <strong>Veri Sorumlusu</strong> sıfatıyla hareket ederiz.</p><div class="cbox"><p class="cl">Veri Sorumlusu</p><p class="cn">Gökdeniz Çiftçi</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`},
{id:"pp2",h:"2. Topladığımız Veriler",b:`<h3>2.1 Siz Tarafından Sağlanan Veriler</h3><ul><li>Hesap bilgileri (görünen ad, isteğe bağlı profil detayları)</li><li>SYLA AI ile yazışmalar ve konuşmalar</li><li>Ses özelliklerini kullandığınızda ses kayıtları</li><li>Paylaşmayı seçtiğiniz günlük girişleri ve ruh hali verileri</li><li>Ödeme bilgileri (RevenueCat tarafından işlenir — kart bilgilerini saklamayız)</li></ul><h3>2.2 Otomatik Olarak Toplanan Veriler</h3><ul><li>Cihaz tanımlayıcıları (Firebase anonim kimliği)</li><li>Uygulama kullanım istatistikleri ve oturum süresi</li><li>Çökme raporları ve performans tanılamaları</li><li>Tercih edilen dil ve bölge</li></ul><h3>2.3 Yapay Zeka Hafıza Sistemi</h3><p>SYLA AI üç katmanlı bir hafıza sistemi kullanır:</p><ul><li><strong>Kısa süreli:</strong> Mevcut konuşma bağlamı</li><li><strong>Uzun süreli:</strong> Profilinizde saklanan geçmiş konuşma özetleri</li><li><strong>Tercih:</strong> Belirtilen ilgi alanlarınız, ton tercihleriniz ve duygusal kalıplarınız</li></ul><p>Hafıza katmanlarından herhangi birinin veya tamamının silinmesini istediğiniz zaman talep edebilirsiniz (bkz. Bölüm 7).</p>`},
{id:"pp3",h:"3. Verilerinizi Nasıl Kullanıyoruz",b:`<ul><li>SYLA AI'ı sağlamak ve işletmek için</li><li>Hafıza profilinizi kullanarak YZ yanıtlarını kişiselleştirmek için</li><li>Abonelikleri işlemek ve hesabınızı yönetmek için</li><li>Yetkili dahili inceleme yoluyla hizmet kalitesini iyileştirmek için (bkz. Bölüm 4)</li><li>Hizmetle ilgili iletişimler göndermek için (pazarlama değil, aksi hâlde onay vermedikçe)</li><li>Türk, AB ve geçerli uluslararası hukuk kapsamındaki yasal yükümlülüklere uymak için</li></ul><div class="hl">Kişisel verilerinizi pazarlama amacıyla herhangi bir üçüncü tarafa satmıyor, kiralamıyor veya ticaretini yapmıyoruz. Hiçbir zaman.</div>`},
{id:"pp4",h:"4. Dahili Veri İncelemesi",b:`<p>SYLA AI'ı geliştirmek ve güvenli etkileşimler sağlamak amacıyla geliştirici (Gökdeniz Çiftçi), Firebase/Firestore'da saklanan konuşma verilerini inceleyebilir. Bu inceleme:</p><ul><li>Yalnızca ürün iyileştirme ve güvenlik amacıyla gerçekleştirilir</li><li>Yalnızca geliştirici tarafından yapılır — üçüncü taraflarla paylaşılmaz</li><li>Profil oluşturma, reklam veya veri satışı için asla kullanılmaz</li><li>Katı gizlilik yükümlülüklerine tabidir</li></ul><p><strong>Hukuki dayanak (GDPR):</strong> Meşru menfaat (Madde 6(1)(f)) — YZ duygusal destek hizmetinin güvenliğini ve kalitesini iyileştirme.</p><p>Bu işleme istediğiniz zaman itiraz edebilirsiniz. Geçerli bir itiraz üzerine verilerinizi incelemeyi durduracak ve kayıtlarınızı sileceğiz.</p><div class="hl">İtiraz hakkı: gokdenizciftciq@icloud.com adresine istediğiniz zaman ulaşabilirsiniz.</div>`},
{id:"pp5",h:"5. Üçüncü Taraf Hizmetler",b:`<h3>OpenAI</h3><ul><li>Mesajlarınız ve sesiniz, yanıt oluşturmak için OpenAI API'sine iletilir</li><li>Verileriniz üzerinde eğitimi devre dışı bırakan API ayarları kullanıyoruz (mevcut durumlarda Sıfır Veri Saklama)</li><li>OpenAI'ye (ABD) yapılan aktarımlar, GDPR kapsamında Standart Sözleşme Maddeleriyle güvence altına alınmıştır</li></ul><h3>Google Firebase / Firestore</h3><ul><li>Kimlik doğrulama, veritabanı ve depolama. AB kullanıcı verileri mümkün olan her yerde AB veri merkezlerinde saklanır</li></ul><h3>RevenueCat</h3><ul><li>Abonelik yönetimi. RevenueCat konuşma verilerinizi almaz</li></ul><h3>Apple App Store / Google Play</h3><ul><li>Uygulama içi satın almalar, Apple ve Google tarafından kendi politikaları kapsamında işlenir</li></ul>`},
{id:"pp6",h:"6. Veri Saklama",b:`<ul><li>Konuşma verileri: Hesabınız aktifken saklanır, silme talebinden 30 gün sonra silinir</li><li>YZ hafıza profilleri: Talep üzerine derhal silinir</li><li>Kullanım analitiği: Anonim formda 24 aya kadar</li><li>Ödeme kayıtları: Türk vergi hukukunun gerektirdiği şekilde 5 yıl</li></ul>`},
{id:"pp7",h:"7. Haklarınız",b:`<p>GDPR (AB) ve KVKK (Türkiye) kapsamında aşağıdaki haklara sahipsiniz:</p><ul><li><strong>Erişim:</strong> Tuttuğumuz tüm verilerin bir kopyasını talep etme</li><li><strong>Düzeltme:</strong> Hatalı verileri düzeltme</li><li><strong>Silme:</strong> Hesabınızı ve ilgili tüm verileri silme</li><li><strong>Taşınabilirlik:</strong> Verilerinizi makine tarafından okunabilir biçimde alma</li><li><strong>Kısıtlama:</strong> Verilerinizin işlenmesini sınırlama</li><li><strong>İtiraz:</strong> Meşru menfaate dayalı işlemeye itiraz etme (Bölüm 4 dahil)</li><li><strong>Onayı geri çekme:</strong> Önceki işlemeyi etkilemeksizin istediğiniz zaman</li></ul><p>İletişim: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> — 30 gün içinde yanıt veririz. AB kullanıcıları ulusal Veri Koruma Otoritelerine başvurabilir. Türk kullanıcılar <strong>Kişisel Verileri Koruma Kurumu (KVKK)</strong>'ya başvurabilir.</p>`},
{id:"pp8",h:"8. Ses Verileri ve Özel Kategoriler",b:`<p>Ses kayıtları, bazı yargı bölgelerinde (GDPR Madde 9 dahil olmak üzere) biyometrik veri sayılabilir. Ses verilerini yalnızca ses özelliklerini etkinleştirdiğinizde açık onayınızla işleriz. Ayarlardan istediğiniz zaman devre dışı bırakabilirsiniz.</p><div class="wl">Ses kayıtları işleme için gerçek zamanlı olarak OpenAI'ye iletilir. Ses aramaları aracılığıyla hassas kişisel, mali veya sağlık bilgilerini paylaşmayın.</div>`},
{id:"pp9",h:"9. Çocuklar ve Küçükler",b:`<p>SYLA AI 18+ olarak derecelendirilmiştir. 13 yaşın altındaki (COPPA) veya 16 yaşın altındaki (GDPR Madde 8) kullanıcılardan bilerek veri toplamıyoruz. Yaşın altındaki bir kullanıcı tespit etmemiz durumunda hesabını ve tüm verilerini derhal sileceğiz.</p><p>Ebeveynler/veliler: Çocuğunuzun hesap oluşturduğunu düşünüyorsanız <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> ile iletişime geçin.</p>`},
{id:"pp10",h:"10. Veri Güvenliği",b:`<ul><li>Tüm veriler iletim sırasında TLS 1.2+ ile şifrelenir</li><li>Firebase beklemedeki verileri şifreler</li><li>Firebase erişimi yalnızca kimliği doğrulanmış geliştirici hesaplarıyla sınırlıdır</li><li>Erişim günlükleri tutulur</li></ul><p>Haklarınızı etkileyen bir ihlal durumunda, sizi ve ilgili makamları 72 saat içinde bilgilendireceğiz (GDPR Madde 33).</p>`},
{id:"pp11",h:"11. Kaliforniya Kullanıcıları (CCPA)",b:`<p>CCPA kapsamında tanımlanan kişisel bilgileri satmıyoruz. Kaliforniya sakinleri, topladığımız verileri öğrenme, silme talep etme ve satıştan çıkma (geçerli değil — veri satmıyoruz) haklarına sahiptir. İletişim: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p>`},
{id:"pp12",h:"12. Bu Politikadaki Değişiklikler",b:`<p>Önemli değişiklikleri, yürürlüğe girmeden en az 14 gün önce uygulama içi bildirim yoluyla bildireceğiz. Yürürlük tarihinden sonra uygulamayı kullanmaya devam etmek kabul anlamına gelir.</p>`}
]},
tos:{eye:"Kullanım Koşulları",title:"Kullanım Koşulları",secs:[
{id:"tos1",h:"1. Koşulların Kabulü",b:`<p>SYLA AI'ı indirerek, yükleyerek veya kullanarak bu Koşulları kabul etmiş olursunuz. Kabul etmiyorsanız Uygulamayı kullanmayın. Bu Koşullar, siz ile Türkiye'de ikamet eden bireysel geliştirici Gökdeniz Çiftçi ("Geliştirici") arasında yasal olarak bağlayıcı bir sözleşme oluşturur.</p>`},
{id:"tos2",h:"2. Uygunluk",b:`<ul><li>En az 18 yaşında olmanız gerekmektedir</li><li>18 yaşın altındaki kullanıcılar kesinlikle yasaktır</li><li>13 yaşın altındaki kullanıcılar kesinlikle yasaktır (COPPA)</li><li>Yargı bölgenizde bağlayıcı sözleşmeler yapma ehliyetine sahip olmanız gerekmektedir</li></ul>`},
{id:"tos3",h:"3. Hizmetin Niteliği — Terapi DEĞİLDİR",b:`<div class="wl">SYLA AI, duygusal destek ve sohbet için bir YZ arkadaşıdır. Bir tıbbi cihaz DEĞİL, lisanslı bir terapi veya danışmanlık hizmeti DEĞİL ve profesyonel ruh sağlığı hizmetlerinin yerini tutmaz.</div><ul><li>SYLA AI tıbbi tavsiye, teşhis veya tedavi sağlamaz</li><li>SYLA AI terapinin, psikiyatrinin veya psikolojik danışmanlığın yerini alamaz</li><li>Kriz durumundaysanız acil servislere veya bir uzmana derhal başvurun</li><li>Geliştirici, YZ konuşmalarına dayalı olarak alınan kararlardan sorumlu değildir</li></ul><div class="hl">Acil: 112 (Türkiye/AB) · 911 (ABD) · 999 (İngiltere). Desteklenen tüm bölgelerde kriz yardım hatları mevcuttur.</div>`},
{id:"tos4",h:"4. Abonelikler ve Ödemeler",b:`<h3>4.1 Ücretsiz Plan</h3><ul><li>Yeni kullanıcılar hesap oluşturulduğunda 30 mesajlık deneme alır</li><li>Denemeden sonra: Günde 15 ücretsiz mesaj</li></ul><h3>4.2 Premium Abonelik</h3><ul><li>Sınırsız mesaj ve ek özellikler</li><li>Seçime göre aylık veya yıllık faturalandırma</li><li>Onayda App Store veya Google Play hesabına ücret yansıtılır</li><li>Dönem bitiminden en az 24 saat önce iptal edilmezse otomatik yenilenir</li><li>App Store / Google Play hesap ayarlarından istediğiniz zaman iptal edilebilir</li><li>Fiyat değişiklikleri 30 gün önceden bildirilir</li></ul><h3>4.3 İadeler</h3><p>İade talepleri doğrudan Apple veya Google'a iletilmelidir. Geliştirici iadeleri doğrudan işlemez.</p>`},
{id:"tos5",h:"5. Kabul Edilebilir Kullanım",b:`<p>Aşağıdakileri YAPMAMAYI kabul edersiniz:</p><ul><li>Uygulamayı herhangi bir yasa dışı amaç için kullanmak</li><li>Kaynak kodu tersine mühendislik, derleme veya çıkarma</li><li>Bot veya otomatik komut dosyaları kullanmak</li><li>İçerik denetimini veya güvenlik önlemlerini atlatmak</li><li>Hesabınızı paylaşmak veya limitleri aşmak için birden fazla hesap oluşturmak</li><li>Kendinizi veya başkalarını taciz etmek veya zarar vermek için Uygulamayı kullanmak</li><li>Temel YZ modelini veya eğitim verilerini çoğaltmaya çalışmak</li></ul>`},
{id:"tos6",h:"6. Sorumluluk Sınırlaması",b:`<p>Yasanın izin verdiği azami ölçüde Geliştirici şunlardan sorumlu değildir: dolaylı veya sonuç olarak ortaya çıkan zararlar; YZ tarafından oluşturulan içeriğe güvenmekten kaynaklanan zararlar; YZ'ye duygusal bağımlılık; veri kaybı veya hizmet kesintisi; ruh sağlığı krizi sırasında alınan eylemler.</p><p>Azami sorumluluk: son 12 ayda ödenen tutarların ya da 100 ABD Dolarının büyük olanı.</p><p>AB kullanıcıları: zorunlu yasal tüketici haklarınız etkilenmez.</p>`},
{id:"tos7",h:"7. Fikri Mülkiyet",b:`<ul><li>SYLA AI, adı, logosu, tasarımı ve tüm tescilli içerik münhasıran Gökdeniz Çiftçi'nin fikri mülkiyetidir</li><li>Kişisel, ticari olmayan kullanım için sınırlı, münhasır olmayan, devredilemez bir lisans verilmektedir</li><li>Kendi içeriğinizin mülkiyetini korursunuz; Uygulamayı kullanarak hizmeti sunmak amacıyla içeriğinizi işlememiz için sınırlı bir lisans vermiş olursunuz</li></ul>`},
{id:"tos8",h:"8. Fesih",b:`<p>Bu Koşulları ihlal etmeniz hâlinde hesabınızı askıya alma veya feshetme hakkını saklı tutarız. Hesabınızı Uygulama ayarları aracılığıyla veya bizimle iletişime geçerek istediğiniz zaman silebilirsiniz. Feshin ardından veriler Gizlilik Politikası'na uygun olarak silinecektir.</p>`},
{id:"tos9",h:"9. Geçerli Hukuk ve Uyuşmazlıklar",b:`<p>Bu Koşullar <strong>Türkiye Cumhuriyeti</strong> hukukuna tabidir. Uyuşmazlıklar önce iyi niyetli müzakereye, çözüme kavuşturulamazsa ikamet ettiğiniz ülkenin zorunlu tüketici koruma mevzuatı aksini gerektirmedikçe <strong>Türkiye, İstanbul</strong> mahkemelerine sunulacaktır.</p><p>AB kullanıcıları: zorunlu AB tüketici hakları etkilenmez.</p>`},
{id:"tos10",h:"10. Koşullardaki Değişiklikler",b:`<p>Önemli değişiklikler yürürlüğe girmeden en az 14 gün önce uygulama içi bildirimle duyurulacaktır. Yürürlük tarihinden sonra kullanmaya devam etmek kabul anlamına gelir.</p>`}
]},
eula:{eye:"Son Kullanıcı Lisans Sözleşmesi",title:"Son Kullanıcı Lisans Sözleşmesi",secs:[
{id:"eu1",h:"1. Lisans Verilmesi",b:`<p>Gökdeniz Çiftçi ("Lisans Veren"), sahip olduğunuz veya kontrolündeki cihazlara SYLA AI'ı yüklemek ve kullanmak için size sınırlı, münhasır olmayan, devredilemez, geri alınabilir bir lisans vermektedir; yalnızca kişisel, ticari olmayan amaçlar için geçerlidir.</p><p>Bu EULA, siz ile Lisans Veren arasındadır. Apple, Inc. ve Google LLC bu sözleşmenin tarafı değildir.</p>`},
{id:"eu2",h:"2. Kısıtlamalar",b:`<ul><li>Uygulamayı kopyalamayın, değiştirmeyin veya türev eserler oluşturmayın</li><li>Uygulamayı satmayın, alt lisanslı yapmayın veya dağıtmayın</li><li>Uygulamayı tersine mühendislik veya derleme işlemine tabi tutmayın</li><li>Herhangi bir tescilli bildirimi veya markayı kaldırmayın veya değiştirmeyin</li><li>Uygulamayı yürürlükteki yasalara aykırı şekilde kullanmayın</li><li>Bu lisansı üçüncü taraflara devretmeyin</li></ul>`},
{id:"eu3",h:"3. Yaş Kısıtlamaları",b:`<p>Uygulama, Apple App Store ve Google Play'de 18+ olarak derecelendirilmiştir. Yükleyerek 18 yaşında veya daha büyük olduğunuzu beyan etmiş olursunuz. 13 yaşın altındaki kişilerin kullanımı kesinlikle yasaktır. Lisans Veren, reşit olmayan kullanıcıların hesaplarını derhal feshetme hakkını saklı tutar.</p>`},
{id:"eu4",h:"4. Tıbbi ve Ruh Sağlığı Feragatnamesi",b:`<div class="wl">SYLA AI, YZ destekli bir duygusal destek arkadaşıdır — lisanslı bir tıbbi veya ruh sağlığı hizmeti değildir. Uygulama içindeki hiçbir içerik tıbbi tavsiye, psikolojik tedavi veya terapi niteliği taşımaz. Lisans Veren, Uygulamanın içeriğine dayanılarak alınan sağlıkla ilgili kararlardan doğan tüm sorumluluğu açıkça reddeder.</div><ul><li>YZ yanıtları hatalı olabilir ve profesyonel tavsiye niteliği taşımaz</li><li>YZ'ye duygusal bağımlılığın doğasında risk barındırdığını kabul edersiniz</li><li>Ciddi ruh sağlığı sorunları yaşıyorsanız profesyonel yardım alın</li></ul>`},
{id:"eu5",h:"5. Üçüncü Taraf Hizmetler",b:`<ul><li><strong>OpenAI</strong> — YZ işleme: <a href="https://openai.com/policies" target="_blank">openai.com/policies</a></li><li><strong>Google Firebase</strong> — Kimlik doğrulama ve veritabanı: <a href="https://firebase.google.com/terms" target="_blank">firebase.google.com/terms</a></li><li><strong>RevenueCat</strong> — Abonelikler: <a href="https://www.revenuecat.com/privacy" target="_blank">revenuecat.com/privacy</a></li><li><strong>Apple / Google Play</strong> — Platform dağıtım koşulları geçerlidir</li></ul>`},
{id:"eu6",h:"6. Fikri Mülkiyet Sahipliği",b:`<p>Tüm kod, tasarım, marka, YZ sistemleri ve tescilli içerik (kullanıcı tarafından oluşturulan içerik hariç) münhasıran Gökdeniz Çiftçi'nin mülkiyetindedir. Açıkça verilmeyen tüm haklar saklıdır.</p>`},
{id:"eu7",h:"7. Garanti Reddi",b:`<p>Uygulama, herhangi bir garanti olmaksızın "OLDUĞU GİBİ" ve "MEVCUT OLDUĞU ŞEKİLDE" sunulmaktadır. Lisans Veren, satılabilirlik, belirli bir amaca uygunluk ve ihlal etmeme dahil tüm garantileri reddeder. YZ tarafından oluşturulan içerik hatalı olabilir; kendi sorumluluğunuzda kullanın.</p>`},
{id:"eu8",h:"8. Apple'a Özgü Hükümler",b:`<ul><li>Bu EULA, siz ile Lisans Veren arasındadır — Apple ile değil</li><li>Apple, Uygulama için bakım veya destek sağlama yükümlülüğü taşımaz</li><li>Apple, Uygulamaya ilişkin talepleri yanıtlamakla sorumlu değildir</li><li>Fikri mülkiyet ihlali taleplerinde Apple hiçbir sorumluluk üstlenmez</li><li>Apple ve Apple'ın bağlı kuruluşları üçüncü taraf lehdarlardır ve bu EULA'yı size karşı uygulayabilirler</li></ul>`},
{id:"eu9",h:"9. Google Play'e Özgü Hükümler",b:`<ul><li>Bu EULA, siz ile Lisans Veren arasındadır — Google LLC ile değil</li><li>Google, Uygulama veya içeriğinden sorumlu değildir</li><li>Uygulama, Google Play Geliştirici Programı Politikalarına uygundur</li></ul>`},
{id:"eu10",h:"10. Fesih",b:`<p>Bu lisans, herhangi bir şartını ihlal etmeniz durumunda otomatik olarak sona erer. Feshin ardından tüm kullanımı durdurun ve tüm kopyaları silin. Lisans Veren, ihlal nedeniyle bu lisansı istediği zaman feshedebilir.</p>`},
{id:"eu11",h:"11. Geçerli Hukuk",b:`<p>Bu EULA, Türkiye Cumhuriyeti hukukuna tabidir. Uyuşmazlıklar, ülkenizin tüketici koruma yasaları aksini gerektirmedikçe İstanbul, Türkiye mahkemelerinin münhasır yargı yetkisine tabidir.</p>`},
{id:"eu12",h:"12. Bölünebilirlik",b:`<p>Bu EULA'nın herhangi bir hükmünün yetkili bir mahkeme tarafından geçersiz, hukuka aykırı veya uygulanamaz bulunması hâlinde, diğer hükümler tam olarak yürürlükte kalmaya devam eder. Geçersiz sayılan hüküm, orijinal amacı en iyi yansıtan geçerli bir hükümle değiştirilir.</p>`},
{id:"eu13",h:"13. Geçerli Dil",b:`<p>Bu EULA kolaylık sağlamak amacıyla birden fazla dilde sunulmuştur. İngilizce sürüm ile herhangi bir çeviri arasında tutarsızlık veya çelişki olması durumunda, <strong>İngilizce sürüm esas alınır</strong> ve yasal yorum açısından bağlayıcı metin olarak kabul edilir.</p>`},
{id:"eu14",h:"14. Mücbir Sebep",b:`<p>Lisans Veren, makul kontrolünün ötesindeki koşullardan kaynaklanan herhangi bir hizmet başarısızlığından veya gecikmesinden sorumlu değildir; bu koşullar şunları içerir ancak bunlarla sınırlı değildir: doğal afetler, savaş, terör, sivil karışıklıklar, pandemiler, hükümet eylemleri, internet hizmet kesintileri, siber saldırılar veya üçüncü taraf hizmetlerindeki (OpenAI, Firebase, Apple, Google veya RevenueCat gibi) başarısızlıklar ya da değişiklikler. Böyle olaylar sırasında Lisans Veren hizmeti sorumluluk üstlenmeksizin askıya alabilir.</p>`},
{id:"eu15",h:"15. Tüm Sözleşme",b:`<p>Bu EULA, Gizlilik Politikası ve Kullanım Koşulları ile birlikte, siz ve Lisans Veren arasındaki SYLA AI'ya ilişkin tüm sözleşmeyi oluşturur ve önceki veya eş zamanlı tüm sözlü veya yazılı iletişimlerin, beyanların veya anlaşmaların yerine geçer. Yazılı olarak yapılıp Lisans Veren tarafından yayımlanmadıkça hiçbir değişiklik, ekleme veya feragat geçerli olmayacaktır.</p>`},

pp:{eye:"Datenschutzrichtlinie",title:"Datenschutzrichtlinie",secs:[
{id:"pp1",h:"1. Wer wir sind",b:`<p>SYLA AI wird von <strong>Gökdeniz Çiftçi</strong>, einem in der Türkei ansässigen Einzelentwickler, betrieben. Kontakt: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p><p>Für EU/EWR-Nutzer handelt Gökdeniz Çiftçi als <strong>Verantwortlicher</strong> im Sinne der DSGVO. Für türkische Nutzer als <strong>Veri Sorumlusu</strong> gemäß KVKK (Gesetz Nr. 6698).</p><div class="cbox"><p class="cl">Verantwortlicher</p><p class="cn">Gökdeniz Çiftçi</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`},
{id:"pp2",h:"2. Erhobene Daten",b:`<h3>2.1 Von Ihnen bereitgestellte Daten</h3><ul><li>Kontoinformationen (Anzeigename, optionale Profilangaben)</li><li>Textnachrichten und Gespräche mit SYLA AI</li><li>Sprachaufnahmen bei Nutzung der Sprachfunktionen</li><li>Tagebucheinträge und Stimmungsdaten, die Sie teilen möchten</li><li>Zahlungsdaten (verarbeitet durch RevenueCat — Kartendaten werden nicht gespeichert)</li></ul><h3>2.2 Automatisch erhobene Daten</h3><ul><li>Gerätekennungen (Firebase-Anonym-ID)</li><li>App-Nutzungsstatistiken und Sitzungsdauer</li><li>Absturzberichte und Leistungsdiagnosen</li><li>Bevorzugte Sprache und Region</li></ul><h3>2.3 KI-Gedächtnissystem</h3><p>SYLA AI nutzt ein dreischichtiges Gedächtnissystem:</p><ul><li><strong>Kurzzeitgedächtnis:</strong> Kontext des aktuellen Gesprächs</li><li><strong>Langzeitgedächtnis:</strong> Zusammenfassungen vergangener Gespräche in Ihrem Profil</li><li><strong>Präferenzgedächtnis:</strong> Ihre Interessen, Tonpräferenzen und emotionalen Muster</li></ul><p>Sie können die Löschung einer oder aller Gedächtnisschichten jederzeit beantragen (siehe Abschnitt 7).</p>`},
{id:"pp3",h:"3. Verwendung Ihrer Daten",b:`<ul><li>Bereitstellung und Betrieb von SYLA AI</li><li>Personalisierung der KI-Antworten anhand Ihres Gedächtnisprofils</li><li>Abonnementverwaltung und Kontoverwaltung</li><li>Verbesserung der Servicequalität durch autorisierte interne Überprüfung (siehe Abschnitt 4)</li><li>Versand servicebezogener Mitteilungen (kein Marketing ohne Ihre Einwilligung)</li><li>Einhaltung gesetzlicher Pflichten nach türkischem, EU- und internationalem Recht</li></ul><div class="hl">Wir verkaufen, vermieten oder handeln Ihre personenbezogenen Daten niemals an Dritte zu Marketingzwecken.</div>`},
{id:"pp4",h:"4. Interne Datenüberprüfung",b:`<p>Zur Verbesserung von SYLA AI und zur Gewährleistung sicherer Interaktionen kann der Entwickler (Gökdeniz Çiftçi) in Firebase/Firestore gespeicherte Gesprächsdaten einsehen. Diese Überprüfung:</p><ul><li>Erfolgt ausschließlich zur Produktverbesserung und für Sicherheitszwecke</li><li>Wird nur vom Entwickler durchgeführt — keine Weitergabe an Dritte</li><li>Wird niemals für Profilerstellung, Werbung oder Datenverkauf genutzt</li><li>Unterliegt strengen Vertraulichkeitspflichten</li></ul><p><strong>Rechtsgrundlage (DSGVO):</strong> Berechtigtes Interesse (Art. 6 Abs. 1 lit. f) — Verbesserung von Sicherheit und Qualität eines KI-Emotionsunterstützungsdienstes.</p><p>Sie können dieser Verarbeitung jederzeit widersprechen. Bei einem wirksamen Widerspruch stellen wir die Überprüfung ein und löschen Ihre Daten.</p><div class="hl">Widerspruchsrecht: Kontaktieren Sie uns jederzeit unter gokdenizciftciq@icloud.com</div>`},
{id:"pp5",h:"5. Drittanbieter",b:`<h3>OpenAI</h3><ul><li>Ihre Nachrichten und Sprachaufnahmen werden zur KI-Antwortgenerierung an die OpenAI-API übermittelt</li><li>Wir nutzen API-Einstellungen, die ein Training mit Ihren Daten deaktivieren (Zero Data Retention, wo verfügbar)</li><li>Datenübermittlungen an OpenAI (USA) sind durch Standardvertragsklauseln gemäß DSGVO abgesichert</li></ul><h3>Google Firebase / Firestore</h3><ul><li>Authentifizierung, Datenbank und Speicherung. EU-Nutzerdaten werden wenn möglich in EU-Rechenzentren gespeichert</li></ul><h3>RevenueCat</h3><ul><li>Abonnementverwaltung. RevenueCat erhält keine Gesprächsdaten</li></ul><h3>Apple App Store / Google Play</h3><ul><li>In-App-Käufe werden von Apple und Google gemäß deren eigenen Richtlinien verarbeitet</li></ul>`},
{id:"pp6",h:"6. Datenspeicherung",b:`<ul><li>Gesprächsdaten: während der Kontoaktivität, Löschung 30 Tage nach Löschantrag</li><li>KI-Gedächtnisprofile: sofortige Löschung auf Anfrage</li><li>Nutzungsanalysen: bis zu 24 Monate in anonymisierter Form</li><li>Zahlungsnachweise: 5 Jahre gemäß türkischem Steuerrecht</li></ul>`},
{id:"pp7",h:"7. Ihre Rechte",b:`<p>Gemäß DSGVO (EU) und KVKK (Türkei) haben Sie das Recht auf:</p><ul><li><strong>Auskunft:</strong> Kopie aller über Sie gespeicherten Daten</li><li><strong>Berichtigung:</strong> Korrektur unrichtiger Daten</li><li><strong>Löschung:</strong> Ihr Konto und alle zugehörigen Daten löschen</li><li><strong>Datenübertragbarkeit:</strong> Daten in maschinenlesbarem Format erhalten</li><li><strong>Einschränkung:</strong> Verarbeitung Ihrer Daten einschränken</li><li><strong>Widerspruch:</strong> gegen Verarbeitung auf Basis berechtigter Interessen (einschl. Abschnitt 4)</li><li><strong>Widerruf der Einwilligung:</strong> jederzeit, ohne Auswirkung auf frühere Verarbeitung</li></ul><p>Kontakt: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> — Antwort innerhalb von 30 Tagen. EU-Nutzer können sich an ihre nationale Datenschutzbehörde wenden. Türkische Nutzer können sich an die <strong>Kişisel Verileri Koruma Kurumu (KVKK)</strong> wenden.</p>`},
{id:"pp8",h:"8. Sprachdaten und besondere Kategorien",b:`<p>Sprachaufnahmen können in bestimmten Rechtsordnungen (möglicherweise auch gemäß Art. 9 DSGVO) als biometrische Daten gelten. Wir verarbeiten Sprachdaten nur mit Ihrer ausdrücklichen Einwilligung bei Aktivierung der Sprachfunktion. Jederzeit in den Einstellungen deaktivierbar.</p><div class="wl">Sprachaufnahmen werden in Echtzeit zur Verarbeitung an OpenAI übertragen. Teilen Sie keine sensiblen persönlichen, finanziellen oder gesundheitsbezogenen Informationen in Sprachanrufen.</div>`},
{id:"pp9",h:"9. Kinder und Minderjährige",b:`<p>SYLA AI ist ab 18 Jahren eingestuft. Wir erheben wissentlich keine Daten von Nutzern unter 13 Jahren (COPPA) oder unter 16 Jahren (Art. 8 DSGVO). Bei Entdeckung eines minderjährigen Nutzers werden das Konto und alle Daten sofort gelöscht.</p><p>Eltern/Erziehungsberechtigte: Kontaktieren Sie uns unter <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p>`},
{id:"pp10",h:"10. Datensicherheit",b:`<ul><li>Alle Daten während der Übertragung mit TLS 1.2+ verschlüsselt</li><li>Firebase bietet Verschlüsselung im Ruhezustand</li><li>Firebase-Zugriff auf authentifizierte Entwicklerkonten beschränkt</li><li>Zugriffsprotokolle werden geführt</li></ul><p>Im Falle einer Datenpanne, die Ihre Rechte beeinträchtigt, benachrichtigen wir Sie und zuständige Behörden innerhalb von 72 Stunden (Art. 33 DSGVO).</p>`},
{id:"pp11",h:"11. Nutzer in Kalifornien (CCPA)",b:`<p>Wir verkaufen keine personenbezogenen Daten im Sinne des CCPA. Kalifornische Einwohner haben das Recht zu erfahren, welche Daten wir erheben, die Löschung zu beantragen und dem Verkauf zu widersprechen (entfällt, da wir keine Daten verkaufen). Kontakt: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p>`},
{id:"pp12",h:"12. Änderungen dieser Richtlinie",b:`<p>Wesentliche Änderungen werden mindestens 14 Tage vor Inkrafttreten per In-App-Benachrichtigung mitgeteilt. Die weitere Nutzung nach Inkrafttreten gilt als Zustimmung.</p>`}
]},
tos:{eye:"Nutzungsbedingungen",title:"Nutzungsbedingungen",secs:[
{id:"tos1",h:"1. Annahme der Bedingungen",b:`<p>Durch das Herunterladen, Installieren oder Nutzen von SYLA AI stimmen Sie diesen Bedingungen zu. Falls Sie nicht einverstanden sind, nutzen Sie die App nicht. Diese Bedingungen bilden einen rechtsverbindlichen Vertrag zwischen Ihnen und Gökdeniz Çiftçi ("Entwickler"), einem in der Türkei ansässigen Einzelentwickler.</p>`},
{id:"tos2",h:"2. Nutzungsvoraussetzungen",b:`<ul><li>Sie müssen mindestens 18 Jahre alt sein</li><li>Minderjährige unter 18 Jahren sind nicht zugelassen</li><li>Nutzer unter 13 Jahren sind streng verboten (COPPA)</li><li>Sie müssen rechtlich in der Lage sein, bindende Verträge in Ihrer Rechtsordnung abzuschließen</li></ul>`},
{id:"tos3",h:"3. Art des Dienstes — KEINE Therapie",b:`<div class="wl">SYLA AI ist ein KI-Begleiter für emotionale Unterstützung und Gespräche. Es ist KEIN Medizinprodukt, KEIN lizenzierter Therapie- oder Beratungsdienst und KEIN Ersatz für professionelle psychische Gesundheitsversorgung.</div><ul><li>SYLA AI bietet keine medizinischen Ratschläge, Diagnosen oder Behandlungen</li><li>SYLA AI kann Therapie, Psychiatrie oder Beratung nicht ersetzen</li><li>Kontaktieren Sie bei einer Krise sofort Notfalldienste oder einen Fachmann</li><li>Der Entwickler haftet nicht für Entscheidungen, die auf der Grundlage von KI-Gesprächen getroffen werden</li></ul><div class="hl">Notruf: 112 (Türkei/EU) · 911 (USA) · 999 (UK). Krisentelefone in allen unterstützten Regionen verfügbar.</div>`},
{id:"tos4",h:"4. Abonnements und Zahlungen",b:`<h3>4.1 Kostenloser Tarif</h3><ul><li>Neue Nutzer erhalten bei der Kontoerstellung eine Testversion mit 30 Nachrichten</li><li>Nach dem Test: 15 kostenlose Nachrichten pro Tag</li></ul><h3>4.2 Premium-Abonnement</h3><ul><li>Unbegrenzte Nachrichten und zusätzliche Funktionen</li><li>Monatliche oder jährliche Abrechnung nach Auswahl</li><li>Zahlung wird bei Bestätigung dem App Store- oder Google Play-Konto belastet</li><li>Automatische Verlängerung, sofern nicht mindestens 24 Stunden vor Periodenende gekündigt</li><li>Jederzeit in den App Store / Google Play-Kontoeinstellungen kündbar</li><li>Preisänderungen werden 30 Tage im Voraus mitgeteilt</li></ul><h3>4.3 Erstattungen</h3><p>Erstattungsanträge müssen direkt bei Apple oder Google eingereicht werden. Der Entwickler bearbeitet keine Erstattungen direkt.</p>`},
{id:"tos5",h:"5. Akzeptable Nutzung",b:`<p>Sie verpflichten sich, NICHT:</p><ul><li>Die App für rechtswidrige Zwecke zu nutzen</li><li>Quellcode zu reverse-engineeren, zu dekompilieren oder zu extrahieren</li><li>Bots oder automatisierte Skripte zu verwenden</li><li>Inhaltsmoderation oder Sicherheitsmaßnahmen zu umgehen</li><li>Ihr Konto zu teilen oder mehrere Konten anzulegen, um Limits zu umgehen</li><li>Die App zur Belästigung oder Schädigung Ihrer selbst oder anderer zu nutzen</li><li>Das zugrunde liegende KI-Modell oder Trainingsdaten zu replizieren</li></ul>`},
{id:"tos6",h:"6. Haftungsbeschränkung",b:`<p>Im gesetzlich zulässigen Höchstmaß haftet der Entwickler nicht für: mittelbare oder Folgeschäden; Vertrauen auf KI-generierte Inhalte; emotionale Abhängigkeit von der KI; Datenverlust oder Dienstunterbrechungen; Handlungen während einer psychischen Krise.</p><p>Maximale Haftung: der höhere Betrag aus den in den vorangegangenen 12 Monaten gezahlten Beträgen oder 100 USD.</p><p>EU-Nutzer: Ihre zwingenden gesetzlichen Verbraucherrechte bleiben unberührt.</p>`},
{id:"tos7",h:"7. Geistiges Eigentum",b:`<ul><li>SYLA AI, sein Name, Logo, Design und alle proprietären Inhalte sind ausschließliches geistiges Eigentum von Gökdeniz Çiftçi</li><li>Sie erhalten eine beschränkte, nicht exklusive, nicht übertragbare Lizenz zur persönlichen, nicht kommerziellen Nutzung</li><li>Sie behalten das Eigentum an Ihren Inhalten; durch die Nutzung der App erteilen Sie eine beschränkte Lizenz zur Verarbeitung Ihrer Inhalte für die Diensterbringung</li></ul>`},
{id:"tos8",h:"8. Kündigung",b:`<p>Wir behalten uns das Recht vor, Ihr Konto bei Verstoß gegen diese Bedingungen zu sperren oder zu kündigen. Sie können Ihr Konto jederzeit über die App-Einstellungen oder durch Kontaktaufnahme löschen. Nach Kündigung werden Daten gemäß der Datenschutzrichtlinie gelöscht.</p>`},
{id:"tos9",h:"9. Anwendbares Recht und Streitigkeiten",b:`<p>Diese Bedingungen unterliegen dem Recht der <strong>Republik Türkei</strong>. Streitigkeiten werden zunächst einer Verhandlung in gutem Glauben unterzogen und, wenn sie ungelöst bleiben, den Gerichten in <strong>Istanbul, Türkei</strong> vorgelegt, sofern nicht das zwingende Verbraucherschutzrecht Ihres Wohnsitzlandes etwas anderes erfordert.</p><p>EU-Nutzer: Ihre zwingenden EU-Verbraucherrechte bleiben unberührt.</p>`},
{id:"tos10",h:"10. Änderungen der Bedingungen",b:`<p>Wesentliche Änderungen werden mindestens 14 Tage vor Inkrafttreten per In-App-Benachrichtigung mitgeteilt. Die weitere Nutzung nach Inkrafttreten gilt als Zustimmung.</p>`}
]},
eula:{eye:"Endbenutzer-Lizenzvertrag",title:"Endbenutzer-Lizenzvertrag",secs:[
{id:"eu1",h:"1. Lizenzgewährung",b:`<p>Gökdeniz Çiftçi ("Lizenzgeber") gewährt Ihnen eine beschränkte, nicht exklusive, nicht übertragbare, widerrufliche Lizenz zur Installation und Nutzung von SYLA AI auf Geräten, die Sie besitzen oder kontrollieren, ausschließlich für persönliche, nicht kommerzielle Zwecke.</p><p>Dieser EULA besteht zwischen Ihnen und dem Lizenzgeber. Apple, Inc. und Google LLC sind keine Vertragspartner.</p>`},
{id:"eu2",h:"2. Einschränkungen",b:`<ul><li>Kopieren, modifizieren oder abgeleitete Werke der Anwendung nicht erstellen</li><li>Anwendung nicht verkaufen, unterlizenzieren oder verteilen</li><li>Anwendung nicht reverse-engineeren oder dekompilieren</li><li>Eigentumshinweise oder Marken nicht entfernen oder ändern</li><li>Anwendung nicht unter Verletzung geltenden Rechts nutzen</li><li>Diese Lizenz nicht an Dritte übertragen</li></ul>`},
{id:"eu3",h:"3. Altersbeschränkungen",b:`<p>Die Anwendung ist im Apple App Store und Google Play als 18+ eingestuft. Mit der Installation erklären Sie, mindestens 18 Jahre alt zu sein. Die Nutzung durch Personen unter 13 Jahren ist streng verboten. Der Lizenzgeber behält sich das Recht vor, Konten minderjähriger Nutzer unverzüglich zu kündigen.</p>`},
{id:"eu4",h:"4. Medizinischer und psychischer Haftungsausschluss",b:`<div class="wl">SYLA AI ist ein KI-gestützter emotionaler Begleiter — kein lizenzierter medizinischer oder psychischer Gesundheitsdienst. Nichts in der Anwendung stellt medizinischen Rat, psychologische Behandlung oder Therapie dar. Der Lizenzgeber lehnt ausdrücklich jegliche Haftung für gesundheitsbezogene Entscheidungen ab, die auf dem Inhalt der Anwendung beruhen.</div><ul><li>KI-Antworten können ungenau sein und stellen keine professionellen Ratschläge dar</li><li>Sie erkennen an, dass emotionale Abhängigkeit von KI inhärente Risiken birgt</li><li>Suchen Sie professionelle Hilfe bei ernsthaften psychischen Problemen</li></ul>`},
{id:"eu5",h:"5. Drittanbieterdienste",b:`<ul><li><strong>OpenAI</strong> — KI-Verarbeitung: <a href="https://openai.com/policies" target="_blank">openai.com/policies</a></li><li><strong>Google Firebase</strong> — Authentifizierung & Datenbank: <a href="https://firebase.google.com/terms" target="_blank">firebase.google.com/terms</a></li><li><strong>RevenueCat</strong> — Abonnements: <a href="https://www.revenuecat.com/privacy" target="_blank">revenuecat.com/privacy</a></li><li><strong>Apple / Google Play</strong> — Plattform-Vertriebsbedingungen gelten</li></ul>`},
{id:"eu6",h:"6. Eigentum am geistigen Eigentum",b:`<p>Alle Codes, Designs, Marken, KI-Systeme und proprietären Inhalte (mit Ausnahme von nutzergenerierten Inhalten) sind ausschließliches Eigentum von Gökdeniz Çiftçi. Alle nicht ausdrücklich gewährten Rechte bleiben vorbehalten.</p>`},
{id:"eu7",h:"7. Gewährleistungsausschluss",b:`<p>Die Anwendung wird „WIE BESEHEN" und „WIE VERFÜGBAR" ohne jegliche Gewährleistung bereitgestellt. Der Lizenzgeber lehnt alle Gewährleistungen ab, einschließlich der Marktgängigkeit, Eignung für einen bestimmten Zweck und Nichtverletzung. KI-generierte Inhalte können ungenau sein; Nutzung auf eigenes Risiko.</p>`},
{id:"eu8",h:"8. Apple-spezifische Bedingungen",b:`<ul><li>Dieser EULA besteht zwischen Ihnen und dem Lizenzgeber — nicht mit Apple</li><li>Apple ist nicht verpflichtet, Wartung oder Support für die Anwendung zu leisten</li><li>Apple ist nicht verantwortlich für die Bearbeitung von Ansprüchen im Zusammenhang mit der Anwendung</li><li>Bei IP-Verletzungsansprüchen trägt Apple keine Verantwortung</li><li>Apple und Apples Tochtergesellschaften sind Drittbegünstigte und können diesen EULA Ihnen gegenüber durchsetzen</li></ul>`},
{id:"eu9",h:"9. Google Play-spezifische Bedingungen",b:`<ul><li>Dieser EULA besteht zwischen Ihnen und dem Lizenzgeber — nicht mit Google LLC</li><li>Google ist nicht verantwortlich für die Anwendung oder deren Inhalte</li><li>Die Anwendung entspricht den Google Play-Entwicklerprogrammrichtlinien</li></ul>`},
{id:"eu10",h:"10. Kündigung",b:`<p>Diese Lizenz erlischt automatisch, wenn Sie gegen ihre Bedingungen verstoßen. Stellen Sie bei Beendigung jede Nutzung ein und löschen Sie alle Kopien. Der Lizenzgeber kann diese Lizenz jederzeit wegen Verstoßes kündigen.</p>`},
{id:"eu11",h:"11. Anwendbares Recht",b:`<p>Dieser EULA unterliegt dem Recht der Republik Türkei. Streitigkeiten unterliegen der ausschließlichen Zuständigkeit der Gerichte in Istanbul, Türkei, sofern das Verbraucherschutzrecht Ihres Landes nichts anderes erfordert.</p>`},
{id:"eu12",h:"12. Salvatorische Klausel",b:`<p>Sollte eine Bestimmung dieses EULA von einem zuständigen Gericht für ungültig, rechtswidrig oder nicht durchsetzbar erklärt werden, bleiben die übrigen Bestimmungen in vollem Umfang wirksam. Die ungültige Bestimmung wird durch eine wirksame Bestimmung ersetzt, die der ursprünglichen Absicht am nächsten kommt.</p>`},
{id:"eu13",h:"13. Maßgebliche Sprache",b:`<p>Dieser EULA wird zu Ihrer Bequemlichkeit in mehreren Sprachen bereitgestellt. Im Falle von Abweichungen oder Widersprüchen zwischen der englischen Fassung und einer Übersetzung ist <strong>die englische Fassung maßgeblich</strong> und gilt als verbindlicher Text für die rechtliche Auslegung.</p>`},
{id:"eu14",h:"14. Höhere Gewalt",b:`<p>Der Lizenzgeber haftet nicht für Leistungsausfälle oder -verzögerungen, die durch Umstände außerhalb seiner zumutbaren Kontrolle verursacht werden, einschließlich, aber nicht beschränkt auf: Naturkatastrophen, Krieg, Terrorismus, zivile Unruhen, Pandemien, behördliche Maßnahmen, Internetdienstunterbrechungen, Cyberangriffe oder Ausfälle bzw. Änderungen bei Drittanbieterdiensten (wie OpenAI, Firebase, Apple, Google oder RevenueCat). Während solcher Ereignisse kann der Lizenzgeber den Dienst ohne Haftung aussetzen.</p>`},
{id:"eu15",h:"15. Gesamte Vereinbarung",b:`<p>Dieser EULA bildet zusammen mit der Datenschutzrichtlinie und den Nutzungsbedingungen die gesamte Vereinbarung zwischen Ihnen und dem Lizenzgeber bezüglich SYLA AI und ersetzt alle vorherigen oder gleichzeitigen Mitteilungen, Zusicherungen oder Vereinbarungen, ob mündlich oder schriftlich. Keine Änderung, Ergänzung oder Verzicht ist wirksam, es sei denn, sie wird schriftlich vorgenommen und vom Lizenzgeber veröffentlicht.</p>`},

pp:{eye:"Política de Privacidad",title:"Política de Privacidad",secs:[
{id:"pp1",h:"1. Quiénes Somos",b:`<p>SYLA AI es operado por <strong>Gökdeniz Çiftçi</strong>, un desarrollador individual residente en Türkiye. Contacto: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p><p>Para usuarios de la UE/EEE, Gökdeniz Çiftçi actúa como <strong>Responsable del Tratamiento</strong> bajo el RGPD. Para usuarios turcos, actuamos como <strong>Veri Sorumlusu</strong> bajo KVKK (Ley N.º 6698).</p><div class="cbox"><p class="cl">Responsable del Tratamiento</p><p class="cn">Gökdeniz Çiftçi</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`},
{id:"pp2",h:"2. Datos que Recopilamos",b:`<h3>2.1 Datos que Usted Proporciona</h3><ul><li>Información de cuenta (nombre de visualización, detalles de perfil opcionales)</li><li>Mensajes de texto y conversaciones con SYLA AI</li><li>Grabaciones de voz al usar funciones de voz</li><li>Entradas de diario y datos de estado de ánimo que elija compartir</li><li>Información de pago (procesada por RevenueCat — no almacenamos datos de tarjetas)</li></ul><h3>2.2 Recopilados Automáticamente</h3><ul><li>Identificadores de dispositivo (ID anónimo de Firebase)</li><li>Estadísticas de uso de la app y duración de sesión</li><li>Informes de fallos y diagnósticos de rendimiento</li><li>Idioma y región preferidos</li></ul><h3>2.3 Sistema de Memoria IA</h3><p>SYLA AI utiliza un sistema de memoria de tres capas:</p><ul><li><strong>Corto plazo:</strong> contexto dentro de la conversación actual</li><li><strong>Largo plazo:</strong> resúmenes de conversaciones pasadas almacenados en su perfil</li><li><strong>Preferencias:</strong> sus intereses declarados, preferencias de tono y patrones emocionales</li></ul><p>Puede solicitar la eliminación de cualquier capa de memoria en cualquier momento (véase Sección 7).</p>`},
{id:"pp3",h:"3. Cómo Usamos sus Datos",b:`<ul><li>Para proporcionar y operar SYLA AI</li><li>Para personalizar las respuestas de IA usando su perfil de memoria</li><li>Para procesar suscripciones y gestionar su cuenta</li><li>Para mejorar la calidad del servicio mediante revisión interna autorizada (véase Sección 4)</li><li>Para enviar comunicaciones relacionadas con el servicio (sin marketing salvo que lo acepte)</li><li>Para cumplir con obligaciones legales bajo la ley turca, de la UE e internacional aplicable</li></ul><div class="hl">No vendemos, alquilamos ni comerciamos sus datos personales a terceros con fines de marketing. Nunca.</div>`},
{id:"pp4",h:"4. Revisión Interna de Datos",b:`<p>Para mejorar SYLA AI y garantizar interacciones seguras, el desarrollador (Gökdeniz Çiftçi) puede revisar datos de conversación almacenados en Firebase/Firestore. Esta revisión:</p><ul><li>Se realiza únicamente para la mejora del producto y la seguridad</li><li>La lleva a cabo solo el desarrollador — no se comparte con terceros</li><li>Nunca se usa para perfilado, publicidad o venta de datos</li><li>Está sujeta a estrictas obligaciones de confidencialidad</li></ul><p><strong>Base jurídica (RGPD):</strong> Interés legítimo (Artículo 6(1)(f)) — mejorar la seguridad y calidad de un servicio de apoyo emocional con IA.</p><p>Puede oponerse a este tratamiento en cualquier momento. Ante una objeción válida, cesaremos la revisión y eliminaremos sus registros.</p><div class="hl">Derecho de oposición: contacte gokdenizciftciq@icloud.com en cualquier momento.</div>`},
{id:"pp5",h:"5. Servicios de Terceros",b:`<h3>OpenAI</h3><ul><li>Sus mensajes y voz se transmiten a la API de OpenAI para generar respuestas</li><li>Usamos configuraciones de API que deshabilitan el entrenamiento con sus datos (Retención Cero de Datos donde esté disponible)</li><li>Las transferencias a OpenAI (EE.UU.) están cubiertas por Cláusulas Contractuales Estándar bajo el RGPD</li></ul><h3>Google Firebase / Firestore</h3><ul><li>Autenticación, base de datos y almacenamiento. Los datos de usuarios de la UE se guardan en centros de datos de la UE cuando es posible</li></ul><h3>RevenueCat</h3><ul><li>Gestión de suscripciones. RevenueCat no recibe sus datos de conversación</li></ul><h3>Apple App Store / Google Play</h3><ul><li>Las compras dentro de la app son procesadas por Apple y Google bajo sus propias políticas</li></ul>`},
{id:"pp6",h:"6. Retención de Datos",b:`<ul><li>Datos de conversación: retenidos mientras su cuenta esté activa, eliminados 30 días después de la solicitud de eliminación</li><li>Perfiles de memoria IA: eliminados inmediatamente a petición</li><li>Analítica de uso: hasta 24 meses en forma anonimizada</li><li>Registros de pago: 5 años según lo requerido por la ley fiscal turca</li></ul>`},
{id:"pp7",h:"7. Sus Derechos",b:`<p>Bajo el RGPD (UE) y KVKK (Türkiye) tiene derecho a:</p><ul><li><strong>Acceso:</strong> solicitar una copia de todos los datos que tenemos</li><li><strong>Rectificación:</strong> corregir datos inexactos</li><li><strong>Supresión:</strong> eliminar su cuenta y todos los datos asociados</li><li><strong>Portabilidad:</strong> recibir sus datos en formato legible por máquina</li><li><strong>Limitación:</strong> restringir cómo procesamos sus datos</li><li><strong>Oposición:</strong> oponerse al tratamiento basado en interés legítimo (incluida la Sección 4)</li><li><strong>Retirar el consentimiento:</strong> en cualquier momento, sin afectar el tratamiento previo</li></ul><p>Contacto: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> — respondemos en 30 días. Los usuarios de la UE pueden contactar a su Autoridad de Protección de Datos nacional. Los usuarios turcos pueden acudir a la <strong>Kişisel Verileri Koruma Kurumu (KVKK)</strong>.</p>`},
{id:"pp8",h:"8. Datos de Voz y Categorías Especiales",b:`<p>Las grabaciones de voz pueden constituir datos biométricos en ciertas jurisdicciones (incluido potencialmente el Artículo 9 del RGPD). Procesamos datos de voz solo con su consentimiento explícito cuando activa las funciones de voz. Desactive en cualquier momento en ajustes.</p><div class="wl">Las grabaciones de voz se transmiten en tiempo real a OpenAI para su procesamiento. No comparta información personal, financiera o de salud sensible a través de llamadas de voz.</div>`},
{id:"pp9",h:"9. Niños y Menores",b:`<p>SYLA AI tiene clasificación 18+. No recopilamos conscientemente datos de usuarios menores de 13 años (COPPA) ni menores de 16 años (Artículo 8 del RGPD). Si descubrimos un usuario menor de edad, eliminaremos inmediatamente su cuenta y todos sus datos.</p><p>Padres/tutores: contacte <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> si cree que su hijo ha creado una cuenta.</p>`},
{id:"pp10",h:"10. Seguridad de Datos",b:`<ul><li>Todos los datos cifrados en tránsito usando TLS 1.2+</li><li>Firebase proporciona cifrado en reposo</li><li>Acceso a Firebase restringido solo a cuentas de desarrollador autenticadas</li><li>Registros de acceso mantenidos</li></ul><p>En caso de una brecha que afecte sus derechos, le notificaremos a usted y a las autoridades pertinentes en 72 horas (Artículo 33 del RGPD).</p>`},
{id:"pp11",h:"11. Usuarios de California (CCPA)",b:`<p>No vendemos información personal según la definición del CCPA. Los residentes de California tienen derecho a saber qué datos recopilamos, solicitar la eliminación y optar por no participar en la venta (no aplicable — no vendemos datos). Contacto: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p>`},
{id:"pp12",h:"12. Cambios en Esta Política",b:`<p>Le notificaremos cambios materiales mediante notificación en la app al menos 14 días antes de que surtan efecto. El uso continuado después de la fecha de vigencia constituye aceptación.</p>`}
]},
tos:{eye:"Términos de Servicio",title:"Términos de Servicio",secs:[
{id:"tos1",h:"1. Aceptación de los Términos",b:`<p>Al descargar, instalar o usar SYLA AI, acepta estos Términos. Si no está de acuerdo, no use la App. Estos Términos forman un acuerdo legalmente vinculante entre usted y Gökdeniz Çiftçi ("Desarrollador"), un desarrollador individual residente en Türkiye.</p>`},
{id:"tos2",h:"2. Elegibilidad",b:`<ul><li>Debe tener al menos 18 años de edad</li><li>Los usuarios menores de 18 años están estrictamente prohibidos</li><li>Está estrictamente prohibido para usuarios menores de 13 años (COPPA)</li><li>Debe tener capacidad legal para celebrar contratos vinculantes en su jurisdicción</li></ul>`},
{id:"tos3",h:"3. Naturaleza del Servicio — NO es Terapia",b:`<div class="wl">SYLA AI es un compañero de IA para apoyo emocional y conversación. NO es un dispositivo médico, NO es un servicio de terapia o asesoramiento con licencia, y NO es un sustituto de la atención profesional de salud mental.</div><ul><li>SYLA AI no proporciona consejos médicos, diagnósticos ni tratamientos</li><li>SYLA AI no puede reemplazar la terapia, la psiquiatría ni el asesoramiento</li><li>Si está en crisis, contacte a los servicios de emergencia o a un profesional de inmediato</li><li>El Desarrollador no es responsable de las decisiones tomadas basándose en conversaciones con la IA</li></ul><div class="hl">Emergencias: 112 (Türkiye/UE) · 911 (EE.UU.) · 999 (RU). Líneas de crisis disponibles en todas las regiones compatibles.</div>`},
{id:"tos4",h:"4. Suscripciones y Pagos",b:`<h3>4.1 Plan Gratuito</h3><ul><li>Los nuevos usuarios reciben una prueba de 30 mensajes al crear su cuenta</li><li>Después de la prueba: 15 mensajes gratuitos por día</li></ul><h3>4.2 Suscripción Premium</h3><ul><li>Mensajes ilimitados y funciones adicionales</li><li>Facturado mensual o anualmente según selección</li><li>El pago se carga a la cuenta de App Store o Google Play al confirmar</li><li>Se renueva automáticamente salvo cancelación al menos 24 horas antes del final del período</li><li>Cancele en cualquier momento en la configuración de la cuenta App Store / Google Play</li><li>Los cambios de precio se comunican con 30 días de antelación</li></ul><h3>4.3 Reembolsos</h3><p>Las solicitudes de reembolso deben presentarse directamente a Apple o Google. El Desarrollador no procesa reembolsos directamente.</p>`},
{id:"tos5",h:"5. Uso Aceptable",b:`<p>Acepta NO:</p><ul><li>Usar la App para ningún propósito ilegal</li><li>Aplicar ingeniería inversa, descompilar o extraer código fuente</li><li>Usar bots o scripts automatizados</li><li>Eludir la moderación de contenidos o medidas de seguridad</li><li>Compartir su cuenta o crear múltiples cuentas para eludir límites</li><li>Usar la App para acosar o dañarse a sí mismo o a otros</li><li>Intentar replicar el modelo de IA subyacente o los datos de entrenamiento</li></ul>`},
{id:"tos6",h:"6. Limitación de Responsabilidad",b:`<p>En la máxima medida permitida por la ley, el Desarrollador no es responsable de: daños indirectos o consecuentes; confianza en contenido generado por IA; dependencia emocional de la IA; pérdida de datos o interrupción del servicio; acciones tomadas durante una crisis de salud mental.</p><p>Responsabilidad máxima: el mayor de los importes pagados en los 12 meses anteriores o 100 USD.</p><p>Usuarios de la UE: sus derechos estatutarios obligatorios de consumidor no se ven afectados.</p>`},
{id:"tos7",h:"7. Propiedad Intelectual",b:`<ul><li>SYLA AI, su nombre, logotipo, diseño y todo el contenido propietario son propiedad intelectual exclusiva de Gökdeniz Çiftçi</li><li>Se le otorga una licencia limitada, no exclusiva y no transferible para uso personal y no comercial</li><li>Usted conserva la propiedad de su propio contenido; al usar la App otorga una licencia limitada para procesar su contenido en la prestación del servicio</li></ul>`},
{id:"tos8",h:"8. Resolución",b:`<p>Nos reservamos el derecho de suspender o cancelar su cuenta si viola estos Términos. Puede eliminar su cuenta en cualquier momento a través de la configuración de la App o contactándonos. Tras la resolución, los datos se eliminarán de acuerdo con la Política de Privacidad.</p>`},
{id:"tos9",h:"9. Ley Aplicable y Disputas",b:`<p>Estos Términos se rigen por las leyes de la <strong>República de Türkiye</strong>. Las disputas se someterán primero a negociación de buena fe y, si no se resuelven, a los tribunales de <strong>Estambul, Türkiye</strong>, salvo que las leyes de protección al consumidor obligatorias de su país de residencia requieran lo contrario.</p><p>Usuarios de la UE: sus derechos obligatorios de consumidor de la UE no se ven afectados.</p>`},
{id:"tos10",h:"10. Cambios en los Términos",b:`<p>Los cambios materiales se notificarán mediante aviso en la app al menos 14 días antes de entrar en vigor. El uso continuado después de la fecha de vigencia constituye aceptación.</p>`}
]},

{id:"eu1",h:"1. Concesión de Licencia",b:`<p>Gökdeniz Çiftçi ("Licenciante") le otorga una licencia limitada, no exclusiva, intransferible y revocable para instalar y usar SYLA AI en dispositivos que posea o controle, exclusivamente para fines personales y no comerciales.</p><p>Este EULA es entre usted y el Licenciante. Apple, Inc. y Google LLC no son partes de este acuerdo.</p>`},
{id:"eu2",h:"2. Restricciones",b:`<ul><li>No copie, modifique ni cree obras derivadas de la Aplicación</li><li>No venda, sublicencie ni distribuya la Aplicación</li><li>No aplique ingeniería inversa ni descompile la Aplicación</li><li>No elimine ni altere ningún aviso o marca de propiedad</li><li>No use la Aplicación en violación de la ley aplicable</li><li>No transfiera esta licencia a ningún tercero</li></ul>`},
{id:"eu3",h:"3. Restricciones de Edad",b:`<p>La Aplicación tiene clasificación 18+ en Apple App Store y Google Play. Al instalarla, declara que tiene al menos 18 años. El uso por personas menores de 13 años está estrictamente prohibido. El Licenciante se reserva el derecho de cancelar inmediatamente las cuentas de usuarios menores de edad.</p>`},
{id:"eu4",h:"4. Aviso Legal Médico y de Salud Mental",b:`<div class="wl">SYLA AI es un compañero de apoyo emocional impulsado por IA — no es un servicio médico ni de salud mental con licencia. Nada dentro de la Aplicación constituye consejo médico, tratamiento psicológico o terapia. El Licenciante renuncia expresamente a toda responsabilidad por decisiones relacionadas con la salud tomadas basándose en el contenido de la Aplicación.</div><ul><li>Las respuestas de IA pueden ser inexactas y no constituyen asesoramiento profesional</li><li>Reconoce que la dependencia emocional de la IA conlleva riesgos inherentes</li><li>Busque ayuda profesional si experimenta problemas graves de salud mental</li></ul>`},
{id:"eu5",h:"5. Servicios de Terceros",b:`<ul><li><strong>OpenAI</strong> — Procesamiento IA: <a href="https://openai.com/policies" target="_blank">openai.com/policies</a></li><li><strong>Google Firebase</strong> — Autenticación y base de datos: <a href="https://firebase.google.com/terms" target="_blank">firebase.google.com/terms</a></li><li><strong>RevenueCat</strong> — Suscripciones: <a href="https://www.revenuecat.com/privacy" target="_blank">revenuecat.com/privacy</a></li><li><strong>Apple / Google Play</strong> — Se aplican los términos de distribución de plataforma</li></ul>`},
{id:"eu6",h:"6. Titularidad de la Propiedad Intelectual",b:`<p>Todo el código, diseño, marca, sistemas de IA y contenido propietario (excluyendo el contenido generado por el usuario) son propiedad exclusiva de Gökdeniz Çiftçi. Todos los derechos no otorgados expresamente quedan reservados.</p>`},
{id:"eu7",h:"7. Exclusión de Garantías",b:`<p>La Aplicación se proporciona "TAL CUAL" y "SEGÚN DISPONIBILIDAD" sin garantías de ningún tipo. El Licenciante renuncia a todas las garantías, incluidas las de comerciabilidad, idoneidad para un propósito particular y no infracción. El contenido generado por IA puede ser inexacto; úselo bajo su propio riesgo.</p>`},
{id:"eu8",h:"8. Términos Específicos de Apple",b:`<ul><li>Este EULA es entre usted y el Licenciante — no con Apple</li><li>Apple no tiene obligación de proporcionar mantenimiento o soporte para la Aplicación</li><li>Apple no es responsable de atender reclamaciones relacionadas con la Aplicación</li><li>En caso de reclamaciones por infracción de PI, Apple no asume ninguna responsabilidad</li><li>Apple y sus subsidiarias son beneficiarios terceros y pueden hacer cumplir este EULA contra usted</li></ul>`},
{id:"eu9",h:"9. Términos Específicos de Google Play",b:`<ul><li>Este EULA es entre usted y el Licenciante — no con Google LLC</li><li>Google no es responsable de la Aplicación ni de su contenido</li><li>La Aplicación cumple con las Políticas del Programa para Desarrolladores de Google Play</li></ul>`},
{id:"eu10",h:"10. Resolución",b:`<p>Esta licencia se rescinde automáticamente si viola cualquiera de sus términos. Tras la resolución, cese todo uso y elimine todas las copias. El Licenciante puede rescindir esta licencia en cualquier momento por incumplimiento.</p>`},
{id:"eu11",h:"11. Ley Aplicable",b:`<p>Este EULA se rige por las leyes de la República de Türkiye. Las disputas estarán sujetas a la jurisdicción exclusiva de los tribunales de Estambul, Türkiye, salvo que las leyes de protección al consumidor de su país requieran lo contrario.</p>`},
{id:"eu12",h:"12. Divisibilidad",b:`<p>Si cualquier disposición de este EULA es considerada inválida, ilegal o inaplicable por un tribunal competente, las disposiciones restantes continuarán en pleno vigor y efecto. La disposición inválida será reemplazada por una disposición válida que refleje más estrechamente la intención original.</p>`},
{id:"eu13",h:"13. Idioma Aplicable",b:`<p>Este EULA se pone a disposición en varios idiomas para su comodidad. En caso de cualquier discrepancia o inconsistencia entre la versión en inglés y cualquier traducción, <strong>prevalecerá la versión en inglés</strong> y se considerará el texto autorizado para la interpretación legal.</p>`},
{id:"eu14",h:"14. Fuerza Mayor",b:`<p>El Licenciante no será responsable de ningún incumplimiento o retraso en la ejecución causado por circunstancias fuera de su control razonable, incluidos, entre otros: desastres naturales, guerra, terrorismo, disturbios civiles, pandemias, acciones gubernamentales, interrupciones del servicio de Internet, ciberataques o fallos o cambios en servicios de terceros (como OpenAI, Firebase, Apple, Google o RevenueCat). Durante tales eventos, el Licenciante puede suspender el servicio sin responsabilidad.</p>`},
{id:"eu15",h:"15. Acuerdo Completo",b:`<p>Este EULA, junto con la Política de Privacidad y los Términos de Servicio, constituye el acuerdo completo entre usted y el Licenciante con respecto a SYLA AI y reemplaza todas las comunicaciones, representaciones o acuerdos previos o contemporáneos, ya sean orales o escritos. Ninguna modificación, enmienda o renuncia será efectiva a menos que se haga por escrito y sea publicada por el Licenciante.</p>`},
{id:"eu16",h:"16. Contacto",b:`<div class="cbox"><p class="cl">Licenciante</p><p class="cn">Gökdeniz Çiftçi</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`}
]}

{id:"pp1",h:"1. Qui Sommes-Nous",b:`<p>SYLA AI est exploité par <strong>Gökdeniz Çiftçi</strong>, un développeur individuel résidant en Türkiye. Contact : <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p><p>Pour les utilisateurs UE/EEE, Gökdeniz Çiftçi agit en tant que <strong>Responsable du traitement</strong> au sens du RGPD. Pour les utilisateurs turcs, nous agissons en tant que <strong>Veri Sorumlusu</strong> au sens de la KVKK (Loi n° 6698).</p><div class="cbox"><p class="cl">Responsable du traitement</p><p class="cn">Gökdeniz Çiftçi</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`},
{id:"pp2",h:"2. Données Collectées",b:`<h3>2.1 Données que vous fournissez</h3><ul><li>Informations de compte (nom d'affichage, détails de profil optionnels)</li><li>Messages texte et conversations avec SYLA AI</li><li>Enregistrements vocaux lors de l'utilisation des fonctions vocales</li><li>Entrées de journal et données d'humeur que vous choisissez de partager</li><li>Informations de paiement (traitées par RevenueCat — nous ne stockons pas les données de carte)</li></ul><h3>2.2 Collectées automatiquement</h3><ul><li>Identifiants d'appareil (ID anonyme Firebase)</li><li>Statistiques d'utilisation de l'app et durée de session</li><li>Rapports de plantage et diagnostics de performance</li><li>Langue et région préférées</li></ul><h3>2.3 Système de mémoire IA</h3><p>SYLA AI utilise un système de mémoire à trois couches :</p><ul><li><strong>Court terme :</strong> contexte de la conversation en cours</li><li><strong>Long terme :</strong> résumés des conversations passées stockés dans votre profil</li><li><strong>Préférences :</strong> vos intérêts déclarés, préférences de ton et schémas émotionnels</li></ul><p>Vous pouvez demander la suppression de tout ou partie des couches de mémoire à tout moment (voir Section 7).</p>`},
{id:"pp3",h:"3. Utilisation de vos Données",b:`<ul><li>Pour fournir et exploiter SYLA AI</li><li>Pour personnaliser les réponses IA en utilisant votre profil de mémoire</li><li>Pour traiter les abonnements et gérer votre compte</li><li>Pour améliorer la qualité du service par une révision interne autorisée (voir Section 4)</li><li>Pour envoyer des communications liées au service (pas de marketing sauf opt-in)</li><li>Pour respecter les obligations légales en droit turc, de l'UE et international applicable</li></ul><div class="hl">Nous ne vendons, ne louons ni ne négocions vos données personnelles à des tiers à des fins de marketing. Jamais.</div>`},
{id:"pp4",h:"4. Révision Interne des Données",b:`<p>Pour améliorer SYLA AI et garantir des interactions sûres, le développeur (Gökdeniz Çiftçi) peut consulter les données de conversation stockées dans Firebase/Firestore. Cette révision :</p><ul><li>Est réalisée uniquement à des fins d'amélioration du produit et de sécurité</li><li>Est effectuée par le seul développeur — non partagée avec des tiers</li><li>N'est jamais utilisée pour le profilage, la publicité ou la vente de données</li><li>Est soumise à de strictes obligations de confidentialité</li></ul><p><strong>Base légale (RGPD) :</strong> Intérêt légitime (Article 6(1)(f)) — améliorer la sécurité et la qualité d'un service de soutien émotionnel par IA.</p><p>Vous pouvez vous opposer à ce traitement à tout moment. Suite à une opposition valide, nous cesserons d'examiner vos données et supprimerons vos enregistrements.</p><div class="hl">Droit d'opposition : contactez gokdenizciftciq@icloud.com à tout moment.</div>`},
{id:"pp5",h:"5. Services Tiers",b:`<h3>OpenAI</h3><ul><li>Vos messages et votre voix sont transmis à l'API OpenAI pour générer des réponses</li><li>Nous utilisons des paramètres API qui désactivent la formation sur vos données (Rétention zéro de données lorsque disponible)</li><li>Les transferts vers OpenAI (États-Unis) sont couverts par des Clauses Contractuelles Types au titre du RGPD</li></ul><h3>Google Firebase / Firestore</h3><ul><li>Authentification, base de données et stockage. Les données des utilisateurs UE sont stockées dans des centres de données UE dans la mesure du possible</li></ul><h3>RevenueCat</h3><ul><li>Gestion des abonnements. RevenueCat ne reçoit pas vos données de conversation</li></ul><h3>Apple App Store / Google Play</h3><ul><li>Les achats intégrés sont traités par Apple et Google selon leurs propres politiques</li></ul>`},
{id:"pp6",h:"6. Conservation des Données",b:`<ul><li>Données de conversation : conservées tant que votre compte est actif, supprimées 30 jours après la demande de suppression</li><li>Profils de mémoire IA : supprimés immédiatement sur demande</li><li>Analyses d'utilisation : jusqu'à 24 mois sous forme anonymisée</li><li>Enregistrements de paiement : 5 ans conformément au droit fiscal turc</li></ul>`},
{id:"pp7",h:"7. Vos Droits",b:`<p>En vertu du RGPD (UE) et de la KVKK (Türkiye), vous avez le droit :</p><ul><li><strong>D'accès :</strong> demander une copie de toutes les données que nous détenons</li><li><strong>De rectification :</strong> corriger des données inexactes</li><li><strong>D'effacement :</strong> supprimer votre compte et toutes les données associées</li><li><strong>De portabilité :</strong> recevoir vos données dans un format lisible par machine</li><li><strong>De limitation :</strong> limiter la manière dont nous traitons vos données</li><li><strong>D'opposition :</strong> vous opposer au traitement fondé sur l'intérêt légitime (y compris Section 4)</li><li><strong>De retrait du consentement :</strong> à tout moment, sans affecter le traitement antérieur</li></ul><p>Contact : <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> — réponse sous 30 jours. Les utilisateurs UE peuvent contacter leur Autorité de protection des données nationale. Les utilisateurs turcs peuvent s'adresser à la <strong>Kişisel Verileri Koruma Kurumu (KVKK)</strong>.</p>`},
{id:"pp8",h:"8. Données Vocales et Catégories Spéciales",b:`<p>Les enregistrements vocaux peuvent constituer des données biométriques dans certaines juridictions (incluant potentiellement l'Article 9 du RGPD). Nous traitons les données vocales uniquement avec votre consentement explicite lorsque vous activez les fonctions vocales. Désactivez à tout moment dans les paramètres.</p><div class="wl">Les enregistrements vocaux sont transmis en temps réel à OpenAI pour traitement. Ne partagez pas d'informations personnelles, financières ou de santé sensibles via les appels vocaux.</div>`},
{id:"pp9",h:"9. Enfants et Mineurs",b:`<p>SYLA AI est classé 18+. Nous ne collectons pas sciemment de données auprès d'utilisateurs de moins de 13 ans (COPPA) ni de moins de 16 ans (Article 8 du RGPD). Si nous découvrons un utilisateur mineur, nous supprimerons immédiatement son compte et toutes ses données.</p><p>Parents/tuteurs : contactez <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> si vous pensez que votre enfant a créé un compte.</p>`},
{id:"pp10",h:"10. Sécurité des Données",b:`<ul><li>Toutes les données chiffrées en transit avec TLS 1.2+</li><li>Firebase assure le chiffrement au repos</li><li>Accès Firebase limité aux seuls comptes de développeur authentifiés</li><li>Journaux d'accès tenus</li></ul><p>En cas de violation affectant vos droits, nous vous notifierons ainsi que les autorités concernées dans les 72 heures (Article 33 du RGPD).</p>`},
{id:"pp11",h:"11. Utilisateurs de Californie (CCPA)",b:`<p>Nous ne vendons pas d'informations personnelles au sens du CCPA. Les résidents californiens ont le droit de savoir quelles données nous collectons, de demander la suppression et de refuser la vente (non applicable — nous ne vendons pas de données). Contact : <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p>`},
{id:"pp12",h:"12. Modifications de cette Politique",b:`<p>Nous vous informerons des modifications importantes via une notification in-app au moins 14 jours avant leur entrée en vigueur. L'utilisation continue après la date d'entrée en vigueur vaut acceptation.</p>`}
]},
tos:{eye:"Conditions d'Utilisation",title:"Conditions d'Utilisation",secs:[
{id:"tos1",h:"1. Acceptation des Conditions",b:`<p>En téléchargeant, installant ou utilisant SYLA AI, vous acceptez ces Conditions. Si vous n'êtes pas d'accord, n'utilisez pas l'App. Ces Conditions forment un accord juridiquement contraignant entre vous et Gökdeniz Çiftçi ("Développeur"), un développeur individuel résidant en Türkiye.</p>`},
{id:"tos2",h:"2. Conditions d'Éligibilité",b:`<ul><li>Vous devez avoir au moins 18 ans</li><li>Les utilisateurs de moins de 18 ans sont strictement interdits</li><li>Strictement interdit aux utilisateurs de moins de 13 ans (COPPA)</li><li>Vous devez avoir la capacité juridique de conclure des contrats contraignants dans votre juridiction</li></ul>`},
{id:"tos3",h:"3. Nature du Service — PAS une Thérapie",b:`<div class="wl">SYLA AI est un compagnon IA pour le soutien émotionnel et la conversation. Ce N'EST PAS un dispositif médical, ce N'EST PAS un service de thérapie ou de conseil agréé, et ce N'EST PAS un substitut aux soins professionnels de santé mentale.</div><ul><li>SYLA AI ne fournit pas de conseils médicaux, de diagnostics ni de traitements</li><li>SYLA AI ne peut pas remplacer la thérapie, la psychiatrie ni le conseil psychologique</li><li>Si vous êtes en crise, contactez immédiatement les services d'urgence ou un professionnel</li><li>Le Développeur n'est pas responsable des décisions prises sur la base des conversations avec l'IA</li></ul><div class="hl">Urgences : 112 (Türkiye/UE) · 911 (États-Unis) · 999 (RU). Lignes de crise disponibles dans toutes les régions prises en charge.</div>`},
{id:"tos4",h:"4. Abonnements et Paiements",b:`<h3>4.1 Plan Gratuit</h3><ul><li>Les nouveaux utilisateurs reçoivent un essai de 30 messages à la création du compte</li><li>Après l'essai : 15 messages gratuits par jour</li></ul><h3>4.2 Abonnement Premium</h3><ul><li>Messages illimités et fonctionnalités supplémentaires</li><li>Facturation mensuelle ou annuelle selon le choix</li><li>Paiement débité sur le compte App Store ou Google Play lors de la confirmation</li><li>Renouvellement automatique sauf annulation au moins 24 heures avant la fin de la période</li><li>Annulation possible à tout moment dans les paramètres du compte App Store / Google Play</li><li>Les changements de prix sont communiqués 30 jours à l'avance</li></ul><h3>4.3 Remboursements</h3><p>Les demandes de remboursement doivent être soumises directement à Apple ou Google. Le Développeur ne traite pas les remboursements directement.</p>`},
{id:"tos5",h:"5. Utilisation Acceptable",b:`<p>Vous acceptez de NE PAS :</p><ul><li>Utiliser l'App à des fins illicites</li><li>Procéder à la rétro-ingénierie, à la décompilation ou à l'extraction du code source</li><li>Utiliser des bots ou des scripts automatisés</li><li>Contourner la modération du contenu ou les mesures de sécurité</li><li>Partager votre compte ou créer plusieurs comptes pour contourner les limites</li><li>Utiliser l'App pour harceler ou nuire à vous-même ou à autrui</li><li>Tenter de répliquer le modèle IA sous-jacent ou les données d'entraînement</li></ul>`},
{id:"tos6",h:"6. Limitation de Responsabilité",b:`<p>Dans la mesure maximale permise par la loi, le Développeur n'est pas responsable de : dommages indirects ou consécutifs ; confiance dans les contenus générés par l'IA ; dépendance émotionnelle envers l'IA ; perte de données ou interruption de service ; actions prises lors d'une crise de santé mentale.</p><p>Responsabilité maximale : le montant le plus élevé entre les sommes versées au cours des 12 mois précédents ou 100 USD.</p><p>Utilisateurs UE : vos droits légaux obligatoires en tant que consommateur restent inchangés.</p>`},
{id:"tos7",h:"7. Propriété Intellectuelle",b:`<ul><li>SYLA AI, son nom, logo, design et tout contenu propriétaire sont la propriété intellectuelle exclusive de Gökdeniz Çiftçi</li><li>Une licence limitée, non exclusive et non transférable est accordée pour usage personnel et non commercial</li><li>Vous conservez la propriété de votre propre contenu ; en utilisant l'App, vous accordez une licence limitée pour traiter votre contenu aux fins de fourniture du service</li></ul>`},
{id:"tos8",h:"8. Résiliation",b:`<p>Nous nous réservons le droit de suspendre ou de résilier votre compte en cas de violation de ces Conditions. Vous pouvez supprimer votre compte à tout moment via les paramètres de l'App ou en nous contactant. Après résiliation, les données seront supprimées conformément à la Politique de Confidentialité.</p>`},
{id:"tos9",h:"9. Droit Applicable et Litiges",b:`<p>Ces Conditions sont régies par le droit de la <strong>République de Türkiye</strong>. Les litiges seront d'abord soumis à une négociation de bonne foi et, s'ils ne sont pas résolus, aux tribunaux d'<strong>Istanbul, Türkiye</strong>, sauf si les lois de protection des consommateurs obligatoires de votre pays de résidence l'exigent autrement.</p><p>Utilisateurs UE : vos droits obligatoires de consommateur UE ne sont pas affectés.</p>`},
{id:"tos10",h:"10. Modifications des Conditions",b:`<p>Les modifications importantes seront notifiées via une notification in-app au moins 14 jours avant leur entrée en vigueur. L'utilisation continue après la date d'entrée en vigueur vaut acceptation.</p>`}
]},
