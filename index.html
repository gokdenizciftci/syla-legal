{id:"eu1",h:"1. Octroi de Licence",b:`<p>Gökdeniz Çiftçi ("Concédant") vous accorde une licence limitée, non exclusive, non transférable et révocable pour installer et utiliser SYLA AI sur des appareils que vous possédez ou contrôlez, uniquement à des fins personnelles et non commerciales.</p><p>Ce CLUF est entre vous et le Concédant. Apple, Inc. et Google LLC ne sont pas parties à cet accord.</p>`},
{id:"eu2",h:"2. Restrictions",b:`<ul><li>Ne pas copier, modifier ou créer des œuvres dérivées de l'Application</li><li>Ne pas vendre, sous-licencier ou distribuer l'Application</li><li>Ne pas procéder à la rétro-ingénierie ni à la décompilation de l'Application</li><li>Ne pas supprimer ni modifier les mentions de propriété ou marques</li><li>Ne pas utiliser l'Application en violation du droit applicable</li><li>Ne pas transférer cette licence à un tiers</li></ul>`},
{id:"eu3",h:"3. Restrictions d'Âge",b:`<p>L'Application est classée 18+ sur l'Apple App Store et Google Play. En l'installant, vous déclarez avoir au moins 18 ans. L'utilisation par des personnes de moins de 13 ans est strictement interdite. Le Concédant se réserve le droit de résilier immédiatement les comptes des utilisateurs mineurs.</p>`},
{id:"eu4",h:"4. Avertissement Médical et de Santé Mentale",b:`<div class="wl">SYLA AI est un compagnon de soutien émotionnel propulsé par l'IA — pas un service médical ou de santé mentale agréé. Rien dans l'Application ne constitue un conseil médical, un traitement psychologique ou une thérapie. Le Concédant décline expressément toute responsabilité pour les décisions liées à la santé prises en se fondant sur le contenu de l'Application.</div><ul><li>Les réponses IA peuvent être inexactes et ne constituent pas des conseils professionnels</li><li>Vous reconnaissez que la dépendance émotionnelle envers l'IA comporte des risques inhérents</li><li>Consultez un professionnel si vous rencontrez de graves problèmes de santé mentale</li></ul>`},
{id:"eu5",h:"5. Services Tiers",b:`<ul><li><strong>OpenAI</strong> — Traitement IA : <a href="https://openai.com/policies" target="_blank">openai.com/policies</a></li><li><strong>Google Firebase</strong> — Authentification et base de données : <a href="https://firebase.google.com/terms" target="_blank">firebase.google.com/terms</a></li><li><strong>RevenueCat</strong> — Abonnements : <a href="https://www.revenuecat.com/privacy" target="_blank">revenuecat.com/privacy</a></li><li><strong>Apple / Google Play</strong> — Les conditions de distribution de plateforme s'appliquent</li></ul>`},
{id:"eu6",h:"6. Titularité de la Propriété Intellectuelle",b:`<p>Tous les codes, designs, marques, systèmes IA et contenus propriétaires (à l'exclusion du contenu généré par l'utilisateur) sont la propriété exclusive de Gökdeniz Çiftçi. Tous les droits non expressément accordés sont réservés.</p>`},
{id:"eu7",h:"7. Exclusion de Garanties",b:`<p>L'Application est fournie "EN L'ÉTAT" et "SELON DISPONIBILITÉ" sans garantie d'aucune sorte. Le Concédant décline toutes les garanties, y compris de qualité marchande, d'adéquation à un usage particulier et de non-contrefaçon. Le contenu généré par l'IA peut être inexact ; utilisez-le à vos propres risques.</p>`},
{id:"eu8",h:"8. Conditions Spécifiques à Apple",b:`<ul><li>Ce CLUF est entre vous et le Concédant — pas avec Apple</li><li>Apple n'a aucune obligation de fournir une maintenance ou un support pour l'Application</li><li>Apple n'est pas responsable du traitement des réclamations relatives à l'Application</li><li>En cas de réclamations pour violation de PI, Apple n'assume aucune responsabilité</li><li>Apple et les filiales d'Apple sont des bénéficiaires tiers et peuvent faire respecter ce CLUF contre vous</li></ul>`},
{id:"eu9",h:"9. Conditions Spécifiques à Google Play",b:`<ul><li>Ce CLUF est entre vous et le Concédant — pas avec Google LLC</li><li>Google n'est pas responsable de l'Application ni de son contenu</li><li>L'Application est conforme aux Politiques du Programme pour les développeurs Google Play</li></ul>`},
{id:"eu10",h:"10. Résiliation",b:`<p>Cette licence prend fin automatiquement si vous en violez les termes. À la résiliation, cessez toute utilisation et supprimez toutes les copies. Le Concédant peut résilier cette licence à tout moment pour manquement.</p>`},
{id:"eu11",h:"11. Droit Applicable",b:`<p>Ce CLUF est régi par le droit de la République de Türkiye. Les litiges relèveront de la compétence exclusive des tribunaux d'Istanbul, Türkiye, sauf si le droit de protection des consommateurs de votre pays l'exige autrement.</p>`},
{id:"eu12",h:"12. Divisibilité",b:`<p>Si une disposition de ce CLUF est jugée invalide, illégale ou inapplicable par un tribunal compétent, les dispositions restantes continueront à produire leurs pleins effets. La disposition invalide sera remplacée par une disposition valide qui reflète le plus fidèlement l'intention originale.</p>`},
{id:"eu13",h:"13. Langue Applicable",b:`<p>Ce CLUF est mis à disposition en plusieurs langues pour votre commodité. En cas de divergence ou d'incohérence entre la version anglaise et toute traduction, <strong>la version anglaise prévaudra</strong> et sera considérée comme le texte faisant foi pour l'interprétation juridique.</p>`},
{id:"eu14",h:"14. Force Majeure",b:`<p>Le Concédant ne sera pas responsable de tout manquement ou retard d'exécution causé par des circonstances indépendantes de sa volonté raisonnable, y compris mais sans s'y limiter : catastrophes naturelles, guerre, terrorisme, troubles civils, pandémies, actions gouvernementales, interruptions des services Internet, cyberattaques, ou défaillances ou changements dans les services tiers (tels qu'OpenAI, Firebase, Apple, Google ou RevenueCat). Pendant de tels événements, le Concédant peut suspendre le service sans responsabilité.</p>`},
{id:"eu15",h:"15. Intégralité de l'Accord",b:`<p>Ce CLUF, conjointement avec la Politique de Confidentialité et les Conditions d'Utilisation, constitue l'intégralité de l'accord entre vous et le Concédant concernant SYLA AI et remplace toutes communications, déclarations ou accords antérieurs ou contemporains, qu'ils soient oraux ou écrits. Aucune modification, amendement ou renonciation ne sera valide à moins d'être fait par écrit et publié par le Concédant.</p>`},
{id:"eu16",h:"16. Contact",b:`<div class="cbox"><p class="cl">Concédant</p><p class="cn">Gökdeniz Çiftçi</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`}
]}

pp:{eye:"Política de Privacidade",title:"Política de Privacidade",secs:[
{id:"pp1",h:"1. Quem Somos",b:`<p>SYLA AI é operado por <strong>Gökdeniz Çiftçi</strong>, um desenvolvedor individual residente na Türkiye. Contato: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p><p>Para usuários da UE/EEE, Gökdeniz Çiftçi atua como <strong>Controlador de Dados</strong> nos termos do RGPD. Para usuários turcos, atuamos como <strong>Veri Sorumlusu</strong> nos termos da KVKK (Lei n.º 6698).</p><div class="cbox"><p class="cl">Controlador de Dados</p><p class="cn">Gökdeniz Çiftçi</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`},
{id:"pp2",h:"2. Dados que Coletamos",b:`<h3>2.1 Dados Fornecidos por Você</h3><ul><li>Informações de conta (nome de exibição, detalhes de perfil opcionais)</li><li>Mensagens de texto e conversas com SYLA AI</li><li>Gravações de voz ao usar recursos de voz</li><li>Entradas de diário e dados de humor que você escolhe compartilhar</li><li>Informações de pagamento (processadas pela RevenueCat — não armazenamos dados de cartão)</li></ul><h3>2.2 Coletados Automaticamente</h3><ul><li>Identificadores de dispositivo (ID anônimo do Firebase)</li><li>Estatísticas de uso do app e duração da sessão</li><li>Relatórios de falhas e diagnósticos de desempenho</li><li>Idioma e região preferidos</li></ul><h3>2.3 Sistema de Memória IA</h3><p>SYLA AI usa um sistema de memória de três camadas:</p><ul><li><strong>Curto prazo:</strong> contexto dentro da conversa atual</li><li><strong>Longo prazo:</strong> resumos de conversas passadas armazenados em seu perfil</li><li><strong>Preferências:</strong> seus interesses declarados, preferências de tom e padrões emocionais</li></ul><p>Você pode solicitar a exclusão de qualquer camada de memória a qualquer momento (veja Seção 7).</p>`},
{id:"pp3",h:"3. Como Usamos seus Dados",b:`<ul><li>Para fornecer e operar o SYLA AI</li><li>Para personalizar respostas da IA usando seu perfil de memória</li><li>Para processar assinaturas e gerenciar sua conta</li><li>Para melhorar a qualidade do serviço por revisão interna autorizada (veja Seção 4)</li><li>Para enviar comunicações relacionadas ao serviço (sem marketing, salvo opt-in)</li><li>Para cumprir obrigações legais nos termos do direito turco, da UE e internacional aplicável</li></ul><div class="hl">Não vendemos, alugamos nem comercializamos seus dados pessoais a terceiros para fins de marketing. Nunca.</div>`},
{id:"pp4",h:"4. Revisão Interna de Dados",b:`<p>Para melhorar o SYLA AI e garantir interações seguras, o desenvolvedor (Gökdeniz Çiftçi) pode revisar dados de conversa armazenados no Firebase/Firestore. Esta revisão:</p><ul><li>É realizada exclusivamente para melhoria do produto e segurança</li><li>É feita somente pelo desenvolvedor — não é compartilhada com terceiros</li><li>Nunca é usada para criação de perfis, publicidade ou venda de dados</li><li>Está sujeita a rígidas obrigações de confidencialidade</li></ul><p><strong>Base legal (RGPD):</strong> Interesse legítimo (Artigo 6(1)(f)) — melhorar a segurança e qualidade de um serviço de suporte emocional com IA.</p><p>Você pode se opor a este tratamento a qualquer momento. Mediante objeção válida, cessaremos a revisão e excluiremos seus registros.</p><div class="hl">Direito de oposição: contate gokdenizciftciq@icloud.com a qualquer momento.</div>`},
{id:"pp5",h:"5. Serviços de Terceiros",b:`<h3>OpenAI</h3><ul><li>Suas mensagens e voz são transmitidas à API da OpenAI para gerar respostas</li><li>Usamos configurações de API que desabilitam o treinamento com seus dados (Retenção Zero de Dados onde disponível)</li><li>Transferências para a OpenAI (EUA) são cobertas por Cláusulas Contratuais Padrão nos termos do RGPD</li></ul><h3>Google Firebase / Firestore</h3><ul><li>Autenticação, banco de dados e armazenamento. Dados de usuários da UE são armazenados em data centers da UE sempre que possível</li></ul><h3>RevenueCat</h3><ul><li>Gestão de assinaturas. A RevenueCat não recebe seus dados de conversa</li></ul><h3>Apple App Store / Google Play</h3><ul><li>Compras dentro do app são processadas pela Apple e Google de acordo com suas próprias políticas</li></ul>`},
{id:"pp6",h:"6. Retenção de Dados",b:`<ul><li>Dados de conversa: retidos enquanto sua conta estiver ativa, excluídos 30 dias após a solicitação de exclusão</li><li>Perfis de memória IA: excluídos imediatamente mediante solicitação</li><li>Análises de uso: até 24 meses em forma anonimizada</li><li>Registros de pagamento: 5 anos conforme exigido pelo direito tributário turco</li></ul>`},
{id:"pp7",h:"7. Seus Direitos",b:`<p>Nos termos do RGPD (UE) e da KVKK (Türkiye), você tem direito a:</p><ul><li><strong>Acesso:</strong> solicitar uma cópia de todos os dados que detemos</li><li><strong>Retificação:</strong> corrigir dados imprecisos</li><li><strong>Eliminação:</strong> excluir sua conta e todos os dados associados</li><li><strong>Portabilidade:</strong> receber seus dados em formato legível por máquina</li><li><strong>Restrição:</strong> limitar como processamos seus dados</li><li><strong>Oposição:</strong> opor-se ao tratamento baseado em interesse legítimo (incluindo Seção 4)</li><li><strong>Retirar o consentimento:</strong> a qualquer momento, sem afetar o tratamento anterior</li></ul><p>Contato: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> — respondemos em 30 dias. Usuários da UE podem contatar sua Autoridade Nacional de Proteção de Dados. Usuários turcos podem recorrer à <strong>Kişisel Verileri Koruma Kurumu (KVKK)</strong>.</p>`},
{id:"pp8",h:"8. Dados de Voz e Categorias Especiais",b:`<p>As gravações de voz podem constituir dados biométricos em certas jurisdições (incluindo potencialmente o Artigo 9 do RGPD). Processamos dados de voz somente com seu consentimento explícito quando você ativa os recursos de voz. Desative a qualquer momento nas configurações.</p><div class="wl">As gravações de voz são transmitidas em tempo real à OpenAI para processamento. Não compartilhe informações pessoais, financeiras ou de saúde sensíveis por chamadas de voz.</div>`},
{id:"pp9",h:"9. Crianças e Menores",b:`<p>SYLA AI tem classificação 18+. Não coletamos conscientemente dados de usuários menores de 13 anos (COPPA) nem menores de 16 anos (Artigo 8 do RGPD). Se descobrirmos um usuário menor de idade, excluiremos imediatamente sua conta e todos os dados.</p><p>Pais/responsáveis: contate <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> se acreditar que seu filho criou uma conta.</p>`},
{id:"pp10",h:"10. Segurança dos Dados",b:`<ul><li>Todos os dados criptografados em trânsito usando TLS 1.2+</li><li>Firebase fornece criptografia em repouso</li><li>Acesso ao Firebase restrito somente a contas de desenvolvedor autenticadas</li><li>Registros de acesso mantidos</li></ul><p>Em caso de violação que afete seus direitos, notificaremos você e as autoridades competentes em 72 horas (Artigo 33 do RGPD).</p>`},
{id:"pp11",h:"11. Usuários da Califórnia (CCPA)",b:`<p>Não vendemos informações pessoais conforme definido pelo CCPA. Residentes da Califórnia têm o direito de saber quais dados coletamos, solicitar exclusão e optar por não participar da venda (não aplicável — não vendemos dados). Contato: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p>`},
{id:"pp12",h:"12. Alterações nesta Política",b:`<p>Notificaremos você sobre mudanças materiais via notificação no app pelo menos 14 dias antes de entrarem em vigor. O uso continuado após a data de vigência constitui aceitação.</p>`}
]},
tos:{eye:"Termos de Serviço",title:"Termos de Serviço",secs:[
{id:"tos1",h:"1. Aceitação dos Termos",b:`<p>Ao baixar, instalar ou usar o SYLA AI, você concorda com estes Termos. Se não concordar, não use o App. Estes Termos formam um acordo legalmente vinculante entre você e Gökdeniz Çiftçi ("Desenvolvedor"), um desenvolvedor individual residente na Türkiye.</p>`},
{id:"tos2",h:"2. Elegibilidade",b:`<ul><li>Você deve ter pelo menos 18 anos de idade</li><li>Usuários menores de 18 anos são estritamente proibidos</li><li>Estritamente proibido para usuários menores de 13 anos (COPPA)</li><li>Você deve ter capacidade legal para celebrar contratos vinculantes em sua jurisdição</li></ul>`},
{id:"tos3",h:"3. Natureza do Serviço — NÃO é Terapia",b:`<div class="wl">SYLA AI é um companheiro de IA para suporte emocional e conversação. NÃO é um dispositivo médico, NÃO é um serviço de terapia ou aconselhamento licenciado, e NÃO é um substituto para cuidados profissionais de saúde mental.</div><ul><li>SYLA AI não fornece conselhos médicos, diagnósticos ou tratamentos</li><li>SYLA AI não pode substituir terapia, psiquiatria ou aconselhamento</li><li>Se estiver em crise, contate serviços de emergência ou um profissional imediatamente</li><li>O Desenvolvedor não é responsável por decisões tomadas com base em conversas com a IA</li></ul><div class="hl">Emergências: 112 (Türkiye/UE) · 190/192 (Brasil) · 911 (EUA). Linhas de crise disponíveis em todas as regiões suportadas.</div>`},
{id:"tos4",h:"4. Assinaturas e Pagamentos",b:`<h3>4.1 Plano Gratuito</h3><ul><li>Novos usuários recebem um teste de 30 mensagens na criação da conta</li><li>Após o teste: 15 mensagens gratuitas por dia</li></ul><h3>4.2 Assinatura Premium</h3><ul><li>Mensagens ilimitadas e recursos adicionais</li><li>Cobrado mensalmente ou anualmente conforme selecionado</li><li>Pagamento debitado na conta App Store ou Google Play na confirmação</li><li>Renovação automática salvo cancelamento pelo menos 24 horas antes do fim do período</li><li>Cancele a qualquer momento nas configurações da conta App Store / Google Play</li><li>Alterações de preço comunicadas com 30 dias de antecedência</li></ul><h3>4.3 Reembolsos</h3><p>Solicitações de reembolso devem ser enviadas diretamente à Apple ou ao Google. O Desenvolvedor não processa reembolsos diretamente.</p>`},
{id:"tos5",h:"5. Uso Aceitável",b:`<p>Você concorda em NÃO:</p><ul><li>Usar o App para qualquer finalidade ilegal</li><li>Fazer engenharia reversa, descompilar ou extrair código-fonte</li><li>Usar bots ou scripts automatizados</li><li>Contornar moderação de conteúdo ou medidas de segurança</li><li>Compartilhar sua conta ou criar várias contas para contornar limites</li><li>Usar o App para assediar ou prejudicar a si mesmo ou a outros</li><li>Tentar replicar o modelo de IA subjacente ou os dados de treinamento</li></ul>`},
{id:"tos6",h:"6. Limitação de Responsabilidade",b:`<p>Na extensão máxima permitida por lei, o Desenvolvedor não é responsável por: danos indiretos ou consequentes; confiança em conteúdo gerado por IA; dependência emocional da IA; perda de dados ou interrupção de serviço; ações tomadas durante uma crise de saúde mental.</p><p>Responsabilidade máxima: o maior valor entre os montantes pagos nos 12 meses anteriores ou 100 USD.</p><p>Usuários da UE: seus direitos estatutários obrigatórios de consumidor não são afetados.</p>`},
{id:"tos7",h:"7. Propriedade Intelectual",b:`<ul><li>SYLA AI, seu nome, logotipo, design e todo o conteúdo proprietário são propriedade intelectual exclusiva de Gökdeniz Çiftçi</li><li>É concedida uma licença limitada, não exclusiva e intransferível para uso pessoal e não comercial</li><li>Você mantém a propriedade de seu próprio conteúdo; ao usar o App, concede uma licença limitada para processar seu conteúdo na prestação do serviço</li></ul>`},
{id:"tos8",h:"8. Rescisão",b:`<p>Reservamo-nos o direito de suspender ou encerrar sua conta se você violar estes Termos. Você pode excluir sua conta a qualquer momento pelas configurações do App ou nos contatando. Após a rescisão, os dados serão excluídos de acordo com a Política de Privacidade.</p>`},
{id:"tos9",h:"9. Lei Aplicável e Disputas",b:`<p>Estes Termos são regidos pelas leis da <strong>República da Türkiye</strong>. As disputas serão primeiro submetidas a negociação de boa-fé e, se não resolvidas, aos tribunais de <strong>Istambul, Türkiye</strong>, salvo se as leis obrigatórias de proteção ao consumidor do seu país de residência exigirem o contrário.</p><p>Usuários da UE: seus direitos obrigatórios de consumidor da UE não são afetados.</p>`},
{id:"tos10",h:"10. Alterações nos Termos",b:`<p>Mudanças materiais serão notificadas via aviso no app pelo menos 14 dias antes de entrarem em vigor. O uso continuado após a data de vigência constitui aceitação.</p>`}
]},

{id:"eu4",h:"4. Aviso Legal Médico e de Saúde Mental",b:`<div class="wl">SYLA AI é um companheiro de suporte emocional com IA — não é um serviço médico ou de saúde mental licenciado. Nada no Aplicativo constitui conselho médico, tratamento psicológico ou terapia. O Licenciante isenta-se expressamente de qualquer responsabilidade por decisões relacionadas à saúde tomadas com base no conteúdo do Aplicativo.</div><ul><li>As respostas da IA podem ser imprecisas e não constituem aconselhamento profissional</li><li>Você reconhece que a dependência emocional da IA acarreta riscos inerentes</li><li>Procure ajuda profissional se estiver enfrentando problemas sérios de saúde mental</li></ul>`},

{id:"eu6",h:"6. Titularidade da Propriedade Intelectual",b:`<p>Todo o código, design, marca, sistemas de IA e conteúdo proprietário (excluindo conteúdo gerado pelo usuário) são propriedade exclusiva de Gökdeniz Çiftçi. Todos os direitos não expressamente concedidos estão reservados.</p>`},
{id:"eu7",h:"7. Isenção de Garantias",b:`<p>O Aplicativo é fornecido "NO ESTADO EM QUE SE ENCONTRA" e "CONFORME DISPONÍVEL", sem garantias de qualquer tipo. O Licenciante isenta-se de todas as garantias, incluindo de comercialização, adequação a uma finalidade específica e não violação. O conteúdo gerado por IA pode ser impreciso; use por sua conta e risco.</p>`},

{id:"eu9",h:"9. Termos Específicos do Google Play",b:`<ul><li>Este EULA é entre você e o Licenciante — não com o Google LLC</li><li>O Google não é responsável pelo Aplicativo ou seu conteúdo</li><li>O Aplicativo está em conformidade com as Políticas do Programa para Desenvolvedores do Google Play</li></ul>`},
{id:"eu10",h:"10. Rescisão",b:`<p>Esta licença é rescindida automaticamente se você violar qualquer um de seus termos. Após a rescisão, cesse todo uso e exclua todas as cópias. O Licenciante pode rescindir esta licença a qualquer momento por violação.</p>`},
{id:"eu11",h:"11. Lei Aplicável",b:`<p>Este EULA é regido pelas leis da República da Türkiye. As disputas estarão sujeitas à jurisdição exclusiva dos tribunais de Istambul, Türkiye, salvo se a lei de proteção ao consumidor do seu país exigir o contrário.</p>`},
{id:"eu12",h:"12. Divisibilidade",b:`<p>Se qualquer disposição deste EULA for considerada inválida, ilegal ou inexequível por um tribunal competente, as demais disposições continuarão em pleno vigor e efeito. A disposição inválida será substituída por uma disposição válida que reflita mais de perto a intenção original.</p>`},
{id:"eu13",h:"13. Idioma Aplicável",b:`<p>Este EULA é disponibilizado em vários idiomas para sua conveniência. Em caso de qualquer discrepância ou inconsistência entre a versão em inglês e qualquer tradução, <strong>prevalecerá a versão em inglês</strong> e será considerada o texto autoritativo para interpretação legal.</p>`},
{id:"eu14",h:"14. Força Maior",b:`<p>O Licenciante não será responsável por qualquer falha ou atraso no desempenho causado por circunstâncias além do controle razoável, incluindo, entre outros: desastres naturais, guerra, terrorismo, distúrbios civis, pandemias, ações governamentais, interrupções do serviço de Internet, ciberataques, ou falhas ou alterações em serviços de terceiros (como OpenAI, Firebase, Apple, Google ou RevenueCat). Durante tais eventos, o Licenciante pode suspender o serviço sem responsabilidade.</p>`},
{id:"eu15",h:"15. Acordo Integral",b:`<p>Este EULA, juntamente com a Política de Privacidade e os Termos de Serviço, constitui o acordo integral entre você e o Licenciante em relação ao SYLA AI e substitui todas as comunicações, representações ou acordos anteriores ou contemporâneos, sejam orais ou escritos. Nenhuma modificação, emenda ou renúncia será válida a menos que seja feita por escrito e publicada pelo Licenciante.</p>`},

pp:{eye:"Политика конфиденциальности",title:"Политика конфиденциальности",secs:[
{id:"pp1",h:"1. О нас",b:`<p>SYLA AI управляется <strong>Гёкденизом Чифтчи</strong> — индивидуальным разработчиком, проживающим в Турции. Контакт: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p><p>Для пользователей из ЕС/ЕЭЗ Гёкдениз Чифтчи выступает в роли <strong>Оператора персональных данных</strong> в соответствии с GDPR. Для пользователей из Турции — в роли <strong>Veri Sorumlusu</strong> в соответствии с KVKK (Закон № 6698).</p><div class="cbox"><p class="cl">Оператор персональных данных</p><p class="cn">Гёкдениз Чифтчи</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`},
{id:"pp2",h:"2. Собираемые данные",b:`<h3>2.1 Данные, которые вы предоставляете</h3><ul><li>Сведения об аккаунте (отображаемое имя, дополнительные данные профиля)</li><li>Текстовые сообщения и переписка с SYLA AI</li><li>Голосовые записи при использовании голосовых функций</li><li>Записи в дневнике и данные о настроении, которыми вы решаете поделиться</li><li>Платёжные данные (обрабатываются RevenueCat — данные карт не хранятся)</li></ul><h3>2.2 Собираемые автоматически</h3><ul><li>Идентификаторы устройств (анонимный ID Firebase)</li><li>Статистика использования приложения и продолжительность сессии</li><li>Отчёты о сбоях и диагностика производительности</li><li>Предпочтительный язык и регион</li></ul><h3>2.3 Система памяти ИИ</h3><p>SYLA AI использует трёхуровневую систему памяти:</p><ul><li><strong>Краткосрочная:</strong> контекст текущего разговора</li><li><strong>Долгосрочная:</strong> краткие записи прошлых разговоров в вашем профиле</li><li><strong>Предпочтения:</strong> ваши интересы, предпочтения по стилю и эмоциональные паттерны</li></ul><p>Вы можете в любое время запросить удаление любого или всех уровней памяти (см. раздел 7).</p>`},
{id:"pp3",h:"3. Использование ваших данных",b:`<ul><li>Для предоставления и эксплуатации SYLA AI</li><li>Для персонализации ответов ИИ с использованием вашего профиля памяти</li><li>Для обработки подписок и управления аккаунтом</li><li>Для улучшения качества сервиса посредством авторизованной внутренней проверки (см. раздел 4)</li><li>Для отправки сервисных уведомлений (без маркетинга, если вы не давали согласия)</li><li>Для соблюдения правовых обязательств по законодательству Турции, ЕС и применимому международному праву</li></ul><div class="hl">Мы никогда не продаём, не сдаём в аренду и не передаём ваши персональные данные третьим лицам в маркетинговых целях.</div>`},
{id:"pp4",h:"4. Внутренняя проверка данных",b:`<p>В целях улучшения SYLA AI и обеспечения безопасности взаимодействий разработчик (Гёкдениз Чифтчи) может просматривать данные переписки, хранящиеся в Firebase/Firestore. Такая проверка:</p><ul><li>Проводится исключительно в целях улучшения продукта и обеспечения безопасности</li><li>Осуществляется только разработчиком — третьим лицам не передаётся</li><li>Никогда не используется для профилирования, рекламы или продажи данных</li><li>Подчиняется строгим требованиям конфиденциальности</li></ul><p><strong>Правовое основание (GDPR):</strong> Законный интерес (статья 6(1)(f)) — улучшение безопасности и качества сервиса эмоциональной поддержки на базе ИИ.</p><p>Вы вправе в любое время возразить против такой обработки. При наличии обоснованного возражения мы прекратим проверку и удалим ваши данные.</p><div class="hl">Право на возражение: свяжитесь с нами по адресу gokdenizciftciq@icloud.com в любое время.</div>`},
{id:"pp5",h:"5. Сторонние сервисы",b:`<h3>OpenAI</h3><ul><li>Ваши сообщения и голосовые данные передаются в API OpenAI для генерации ответов</li><li>Мы используем настройки API, отключающие обучение на ваших данных (нулевое хранение данных при наличии)</li><li>Передача данных в OpenAI (США) осуществляется в соответствии со Стандартными договорными положениями GDPR</li></ul><h3>Google Firebase / Firestore</h3><ul><li>Аутентификация, база данных и хранилище. Данные пользователей из ЕС хранятся в дата-центрах ЕС при наличии возможности</li></ul><h3>RevenueCat</h3><ul><li>Управление подписками. RevenueCat не получает данные ваших переписок</li></ul><h3>Apple App Store / Google Play</h3><ul><li>Покупки в приложении обрабатываются Apple и Google в соответствии с их собственными политиками</li></ul>`},
{id:"pp6",h:"6. Сроки хранения данных",b:`<ul><li>Данные переписки: хранятся, пока аккаунт активен; удаляются через 30 дней после запроса об удалении</li><li>Профили памяти ИИ: удаляются немедленно по запросу</li><li>Аналитика использования: до 24 месяцев в анонимизированном виде</li><li>Платёжные записи: 5 лет в соответствии с требованиями налогового законодательства Турции</li></ul>`},
{id:"pp7",h:"7. Ваши права",b:`<p>В соответствии с GDPR (ЕС) и KVKK (Турция) вы имеете право:</p><ul><li><strong>Доступ:</strong> запросить копию всех хранящихся данных</li><li><strong>Исправление:</strong> исправить неточные данные</li><li><strong>Удаление:</strong> удалить аккаунт и все связанные данные</li><li><strong>Переносимость:</strong> получить данные в машиночитаемом формате</li><li><strong>Ограничение:</strong> ограничить обработку ваших данных</li><li><strong>Возражение:</strong> возразить против обработки на основании законного интереса (включая раздел 4)</li><li><strong>Отзыв согласия:</strong> в любое время, без ущерба для предшествующей обработки</li></ul><p>Контакт: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> — ответ в течение 30 дней. Пользователи из ЕС могут обратиться в национальный орган по защите данных. Пользователи из Турции могут обратиться в <strong>Kişisel Verileri Koruma Kurumu (KVKK)</strong>.</p>`},
{id:"pp8",h:"8. Голосовые данные и особые категории",b:`<p>Голосовые записи могут считаться биометрическими данными в ряде юрисдикций (в том числе в рамках статьи 9 GDPR). Голосовые данные обрабатываются только при наличии вашего явного согласия в момент активации голосовых функций. Отключить можно в любое время в настройках.</p><div class="wl">Голосовые записи передаются в OpenAI в режиме реального времени для обработки. Не передавайте конфиденциальные личные, финансовые или медицинские данные через голосовые вызовы.</div>`},
{id:"pp9",h:"9. Дети и несовершеннолетние",b:`<p>SYLA AI имеет возрастной рейтинг 18+. Мы сознательно не собираем данные пользователей младше 13 лет (COPPA) или младше 16 лет (статья 8 GDPR). При обнаружении несовершеннолетнего пользователя его аккаунт и все данные будут немедленно удалены.</p><p>Родители/опекуны: свяжитесь по адресу <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a>, если вы считаете, что ваш ребёнок создал аккаунт.</p>`},
{id:"pp10",h:"10. Безопасность данных",b:`<ul><li>Все данные шифруются при передаче с использованием TLS 1.2+</li><li>Firebase обеспечивает шифрование данных в состоянии покоя</li><li>Доступ к Firebase ограничен только аутентифицированными аккаунтами разработчика</li><li>Ведутся журналы доступа</li></ul><p>В случае утечки данных, затрагивающей ваши права, мы уведомим вас и соответствующие органы в течение 72 часов (статья 33 GDPR).</p>`},
{id:"pp11",h:"11. Пользователи из Калифорнии (CCPA)",b:`<p>Мы не продаём персональные данные в понимании CCPA. Жители Калифорнии имеют право знать, какие данные мы собираем, запрашивать удаление и отказываться от продажи (неприменимо — мы не продаём данные). Контакт: <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p>`},
{id:"pp12",h:"12. Изменения в политике",b:`<p>О существенных изменениях мы уведомим вас через уведомление в приложении не менее чем за 14 дней до вступления в силу. Продолжение использования после даты вступления в силу означает согласие.</p>`}
]},
tos:{eye:"Условия использования",title:"Условия использования",secs:[
{id:"tos1",h:"1. Принятие условий",b:`<p>Загружая, устанавливая или используя SYLA AI, вы соглашаетесь с настоящими Условиями. Если вы не согласны, не используйте приложение. Настоящие Условия образуют юридически обязывающее соглашение между вами и Гёкденизом Чифтчи ("Разработчик") — индивидуальным разработчиком, проживающим в Турции.</p>`},
{id:"tos2",h:"2. Требования к пользователям",b:`<ul><li>Вам должно быть не менее 18 лет</li><li>Пользователи младше 18 лет строго запрещены</li><li>Пользователям до 13 лет использование строго запрещено (COPPA)</li><li>Вы должны обладать правоспособностью для заключения обязывающих договоров в вашей юрисдикции</li></ul>`},
{id:"tos3",h:"3. Характер сервиса — НЕ терапия",b:`<div class="wl">SYLA AI — это ИИ-компаньон для эмоциональной поддержки и общения. Это НЕ медицинское устройство, НЕ лицензированная терапевтическая или консультационная служба и НЕ замена профессиональной психиатрической помощи.</div><ul><li>SYLA AI не даёт медицинских советов, не ставит диагнозы и не назначает лечение</li><li>SYLA AI не может заменить терапию, психиатрию или психологическое консультирование</li><li>В кризисной ситуации немедленно обратитесь в экстренные службы или к специалисту</li><li>Разработчик не несёт ответственности за решения, принятые на основе разговоров с ИИ</li></ul><div class="hl">Экстренная помощь: 112 (Турция/ЕС) · 911 (США) · 999 (Великобритания). Телефоны доверия доступны во всех поддерживаемых регионах.</div>`},
{id:"tos4",h:"4. Подписки и платежи",b:`<h3>4.1 Бесплатный тариф</h3><ul><li>Новые пользователи получают пробный период на 30 сообщений при создании аккаунта</li><li>После пробного периода: 15 бесплатных сообщений в день</li></ul><h3>4.2 Премиум-подписка</h3><ul><li>Неограниченное количество сообщений и дополнительные функции</li><li>Ежемесячная или ежегодная оплата по выбору</li><li>Оплата списывается с аккаунта App Store или Google Play при подтверждении</li><li>Автоматически продлевается, если не отменить за 24 часа до окончания периода</li><li>Отменить можно в любое время в настройках аккаунта App Store / Google Play</li><li>Изменения цен сообщаются за 30 дней</li></ul><h3>4.3 Возврат средств</h3><p>Запросы на возврат средств необходимо направлять напрямую в Apple или Google. Разработчик не обрабатывает возвраты напрямую.</p>`},
{id:"tos5",h:"5. Допустимое использование",b:`<p>Вы соглашаетесь НЕ:</p><ul><li>Использовать приложение в незаконных целях</li><li>Применять обратную разработку, декомпиляцию или извлечение исходного кода</li><li>Использовать ботов или автоматизированные скрипты</li><li>Обходить модерацию контента или меры безопасности</li><li>Делиться аккаунтом или создавать несколько аккаунтов для обхода ограничений</li><li>Использовать приложение для преследования или причинения вреда себе или другим</li><li>Пытаться воспроизвести базовую модель ИИ или данные для обучения</li></ul>`},
{id:"tos6",h:"6. Ограничение ответственности",b:`<p>В максимальной мере, допускаемой законом, Разработчик не несёт ответственности за: косвенный или последующий ущерб; доверие к контенту, созданному ИИ; эмоциональную зависимость от ИИ; потерю данных или перебои в работе сервиса; действия, совершённые в ходе психологического кризиса.</p><p>Максимальная ответственность: большее из — суммы, уплаченной за предшествующие 12 месяцев, или 100 долл. США.</p><p>Пользователи из ЕС: ваши обязательные права потребителей остаются в силе.</p>`},
{id:"tos7",h:"7. Интеллектуальная собственность",b:`<ul><li>SYLA AI, его название, логотип, дизайн и весь фирменный контент являются исключительной интеллектуальной собственностью Гёкдениза Чифтчи</li><li>Предоставляется ограниченная, неисключительная, непередаваемая лицензия для личного некоммерческого использования</li><li>Вы сохраняете право собственности на свой контент; используя приложение, вы предоставляете ограниченную лицензию на обработку вашего контента в целях оказания услуги</li></ul>`},
{id:"tos8",h:"8. Прекращение действия",b:`<p>Мы оставляем за собой право приостановить или прекратить действие вашего аккаунта в случае нарушения настоящих Условий. Вы можете удалить аккаунт в любое время через настройки приложения или связавшись с нами. После прекращения данные будут удалены в соответствии с Политикой конфиденциальности.</p>`},
{id:"tos9",h:"9. Применимое право и споры",b:`<p>Настоящие Условия регулируются законодательством <strong>Турецкой Республики</strong>. Споры сначала подлежат урегулированию путём добросовестных переговоров, а при отсутствии результата — рассмотрению в судах <strong>Стамбула, Турция</strong>, если только обязательное законодательство о защите прав потребителей вашей страны проживания не требует иного.</p><p>Пользователи из ЕС: ваши обязательные права потребителей ЕС остаются в силе.</p>`},
{id:"tos10",h:"10. Изменения условий",b:`<p>О существенных изменениях вы будете уведомлены через уведомление в приложении не менее чем за 14 дней до вступления в силу. Продолжение использования после даты вступления в силу означает согласие.</p>`}
]},
eula:{eye:"Лицензионное соглашение с конечным пользователем",title:"Лицензионное соглашение с конечным пользователем",secs:[
{id:"eu1",h:"1. Предоставление лицензии",b:`<p>Гёкдениз Чифтчи ("Лицензиар") предоставляет вам ограниченную, неисключительную, непередаваемую, отзывную лицензию на установку и использование SYLA AI на устройствах, которыми вы владеете или управляете, исключительно в личных некоммерческих целях.</p><p>Настоящее ЛСКУ заключено между вами и Лицензиаром. Apple, Inc. и Google LLC не являются сторонами данного соглашения.</p>`},
{id:"eu2",h:"2. Ограничения",b:`<ul><li>Не копировать, не изменять и не создавать производные произведения Приложения</li><li>Не продавать, не сублицензировать и не распространять Приложение</li><li>Не применять обратную разработку и не декомпилировать Приложение</li><li>Не удалять и не изменять уведомления о правах собственности или маркировку</li><li>Не использовать Приложение в нарушение применимого законодательства</li><li>Не передавать данную лицензию третьим лицам</li></ul>`},
{id:"eu3",h:"3. Возрастные ограничения",b:`<p>Приложение имеет рейтинг 18+ в Apple App Store и Google Play. Устанавливая его, вы подтверждаете, что вам не менее 18 лет. Использование лицами младше 13 лет строго запрещено. Лицензиар оставляет за собой право немедленно прекратить действие аккаунтов несовершеннолетних пользователей.</p>`},
{id:"eu4",h:"4. Медицинская оговорка и оговорка о психическом здоровье",b:`<div class="wl">SYLA AI — ИИ-компаньон для эмоциональной поддержки, а не лицензированный медицинский сервис или служба психического здоровья. Ничто в Приложении не является медицинским советом, психологическим лечением или терапией. Лицензиар прямо отказывается от какой-либо ответственности за решения в сфере здоровья, принятые на основе контента Приложения.</div><ul><li>Ответы ИИ могут быть неточными и не являются профессиональными советами</li><li>Вы признаёте, что эмоциональная зависимость от ИИ сопряжена с присущими рисками</li><li>Обратитесь за профессиональной помощью, если испытываете серьёзные проблемы с психическим здоровьем</li></ul>`},
{id:"eu5",h:"5. Сторонние сервисы",b:`<ul><li><strong>OpenAI</strong> — Обработка ИИ: <a href="https://openai.com/policies" target="_blank">openai.com/policies</a></li><li><strong>Google Firebase</strong> — Аутентификация и база данных: <a href="https://firebase.google.com/terms" target="_blank">firebase.google.com/terms</a></li><li><strong>RevenueCat</strong> — Подписки: <a href="https://www.revenuecat.com/privacy" target="_blank">revenuecat.com/privacy</a></li><li><strong>Apple / Google Play</strong> — Применяются условия платформенного распространения</li></ul>`},
{id:"eu6",h:"6. Права на интеллектуальную собственность",b:`<p>Весь код, дизайн, бренды, системы ИИ и фирменный контент (за исключением контента, созданного пользователями) являются исключительной собственностью Гёкдениза Чифтчи. Все права, прямо не предоставленные, зарезервированы.</p>`},
{id:"eu7",h:"7. Отказ от гарантий",b:`<p>Приложение предоставляется "КАК ЕСТЬ" и "ПО МЕРЕ ДОСТУПНОСТИ" без каких-либо гарантий. Лицензиар отказывается от всех гарантий, включая товарную пригодность, пригодность для определённой цели и ненарушение прав. Контент, созданный ИИ, может быть неточным; используйте на свой страх и риск.</p>`},
{id:"eu8",h:"8. Условия, специфичные для Apple",b:`<ul><li>Настоящее ЛСКУ заключено между вами и Лицензиаром — не с Apple</li><li>Apple не обязана обеспечивать техническое обслуживание или поддержку Приложения</li><li>Apple не несёт ответственности за рассмотрение претензий, связанных с Приложением</li><li>В случае претензий о нарушении прав ИС Apple не несёт ответственности</li><li>Apple и дочерние компании Apple являются третьими лицами — выгодоприобретателями и могут применять настоящее ЛСКУ в отношении вас</li></ul>`},
{id:"eu9",h:"9. Условия, специфичные для Google Play",b:`<ul><li>Настоящее ЛСКУ заключено между вами и Лицензиаром — не с Google LLC</li><li>Google не несёт ответственности за Приложение или его контент</li><li>Приложение соответствует политикам Программы для разработчиков Google Play</li></ul>`},
{id:"eu10",h:"10. Прекращение действия",b:`<p>Данная лицензия автоматически прекращается при нарушении вами любого из её условий. После прекращения прекратите любое использование и удалите все копии. Лицензиар вправе прекратить действие лицензии в любое время в случае нарушения.</p>`},
{id:"eu11",h:"11. Применимое право",b:`<p>Настоящее ЛСКУ регулируется законодательством Турецкой Республики. Споры подлежат исключительной юрисдикции судов Стамбула, Турция, если только законодательство о защите прав потребителей вашей страны не требует иного.</p>`},
{id:"eu12",h:"12. Делимость положений",b:`<p>Если какое-либо положение настоящего ЛСКУ признаётся недействительным, незаконным или не подлежащим исполнению судом компетентной юрисдикции, остальные положения остаются в полной силе и действии. Недействительное положение заменяется действительным положением, наиболее полно отражающим первоначальное намерение.</p>`},
{id:"eu13",h:"13. Применимый язык",b:`<p>Настоящее ЛСКУ предоставляется на нескольких языках для вашего удобства. В случае расхождений или несоответствий между английской версией и любым переводом <strong>английская версия имеет приоритет</strong> и считается аутентичным текстом для правового толкования.</p>`},
{id:"eu14",h:"14. Форс-мажор",b:`<p>Лицензиар не несёт ответственности за неисполнение или задержку исполнения, вызванные обстоятельствами, находящимися вне разумного контроля, включая, но не ограничиваясь: стихийные бедствия, война, терроризм, гражданские беспорядки, пандемии, действия государственных органов, перебои в работе интернет-сервисов, кибератаки или сбои либо изменения в сторонних сервисах (таких как OpenAI, Firebase, Apple, Google или RevenueCat). В ходе таких событий Лицензиар может приостановить сервис без несения ответственности.</p>`},
{id:"eu15",h:"15. Полное соглашение",b:`<p>Настоящее ЛСКУ вместе с Политикой конфиденциальности и Условиями использования образует полное соглашение между вами и Лицензиаром относительно SYLA AI и заменяет все предшествующие или одновременные устные или письменные сообщения, заверения или соглашения. Никакое изменение, дополнение или отказ не имеют силы, если они не оформлены письменно и не опубликованы Лицензиаром.</p>`},
{id:"eu16",h:"16. Контакт",b:`<div class="cbox"><p class="cl">Лицензиар</p><p class="cn">Гёкдениз Чифтчи</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`}
]}

{id:"pp1",h:"1. 私たちについて",b:`<p>SYLA AIは、トルコに居住する個人開発者である<strong>ギョクデニズ・チフトチ</strong>によって運営されています。連絡先：<a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p><p>EU/EEAのユーザーについては、ギョクデニズ・チフトチがGDPR上の<strong>データ管理者</strong>として行動します。トルコのユーザーについては、KVKK（法律第6698号）上の<strong>Veri Sorumlusu（データ管理者）</strong>として行動します。</p><div class="cbox"><p class="cl">データ管理者</p><p class="cn">ギョクデニズ・チフトチ</p><p class="cs">Türkiye</p><a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`},
{id:"pp2",h:"2. 収集するデータ",b:`<h3>2.1 お客様が提供するデータ</h3><ul><li>アカウント情報（表示名、任意のプロフィール詳細）</li><li>SYLA AIとのテキストメッセージおよび会話</li><li>音声機能使用時の録音</li><li>共有を選択した日記の記録や気分データ</li><li>支払い情報（RevenueCatが処理 — カード情報は保存しません）</li></ul><h3>2.2 自動的に収集されるデータ</h3><ul><li>デバイス識別子（Firebase匿名ID）</li><li>アプリ使用統計とセッション時間</li><li>クラッシュレポートとパフォーマンス診断</li><li>優先言語と地域</li></ul><h3>2.3 AIメモリシステム</h3><p>SYLA AIは三層メモリシステムを使用します：</p><ul><li><strong>短期記憶：</strong>現在の会話内のコンテキスト</li><li><strong>長期記憶：</strong>プロフィールに保存された過去の会話の要約</li><li><strong>好み記憶：</strong>ご自身の関心事、トーンの好み、感情パターン</li></ul><p>いずれかまたはすべてのメモリ層の削除をいつでもリクエストできます（第7条参照）。</p>`},
{id:"pp3",h:"3. データの使用方法",b:`<ul><li>SYLA AIの提供および運営のため</li><li>メモリプロファイルを使用したAI応答のパーソナライズのため</li><li>サブスクリプションの処理およびアカウント管理のため</li><li>承認された内部レビューによるサービス品質向上のため（第4条参照）</li><li>サービス関連の通知送信のため（オプトインしない限りマーケティングは行いません）</li><li>トルコ法、EU法、適用される国際法に基づく法的義務の遵守のため</li></ul><div class="hl">マーケティング目的で個人データを第三者に販売、貸し出し、取引することは一切ありません。</div>`},
{id:"pp4",h:"4. 内部データレビュー",b:`<p>SYLA AIを改善し、安全なインタラクションを確保するために、開発者（ギョクデニズ・チフトチ）はFirebase/Firestoreに保存された会話データをレビューする場合があります。このレビューは：</p><ul><li>製品改善と安全のためのみに実施されます</li><li>開発者のみが行います — 第三者と共有しません</li><li>プロファイリング、広告、データ販売には一切使用しません</li><li>厳格な守秘義務に従います</li></ul><p><strong>法的根拠（GDPR）：</strong>正当な利益（第6条(1)(f)） — AIによる感情サポートサービスの安全性と品質の向上。</p><p>この処理にいつでも異議を申し立てることができます。正当な異議申し立てがあった場合、データのレビューを停止し、記録を削除します。</p><div class="hl">異議申し立ての権利：gokdenizciftciq@icloud.comにいつでもご連絡ください。</div>`},
{id:"pp5",h:"5. 第三者サービス",b:`<h3>OpenAI</h3><ul><li>応答生成のためにメッセージと音声データがOpenAI APIに送信されます</li><li>お客様のデータを使用したトレーニングを無効にするAPI設定を使用しています（利用可能な場合はゼロデータ保持）</li><li>OpenAI（米国）へのデータ転送はGDPRの標準契約条項でカバーされます</li></ul><h3>Google Firebase / Firestore</h3><ul><li>認証、データベース、ストレージ。EUユーザーのデータは可能な限りEUデータセンターに保存されます</li></ul><h3>RevenueCat</h3><ul><li>サブスクリプション管理。RevenueCatは会話データを受け取りません</li></ul><h3>Apple App Store / Google Play</h3><ul><li>アプリ内購入はAppleとGoogleが各自のポリシーに従って処理します</li></ul>`},
{id:"pp6",h:"6. データ保持期間",b:`<ul><li>会話データ：アカウントがアクティブな間保持し、削除リクエストから30日後に削除</li><li>AIメモリプロファイル：リクエスト後即時削除</li><li>使用分析：匿名化された形式で最大24ヶ月</li><li>支払い記録：トルコの税法が要求する5年間</li></ul>`},
{id:"pp7",h:"7. お客様の権利",b:`<p>GDPR（EU）およびKVKK（トルコ）の下で、以下の権利を有します：</p><ul><li><strong>アクセス権：</strong>保持するすべてのデータのコピーを請求する</li><li><strong>訂正権：</strong>不正確なデータを修正する</li><li><strong>消去権：</strong>アカウントと関連するすべてのデータを削除する</li><li><strong>データポータビリティ：</strong>機械可読形式でデータを受け取る</li><li><strong>制限権：</strong>データ処理を制限する</li><li><strong>異議申し立て権：</strong>正当な利益に基づく処理に異議を申し立てる（第4条を含む）</li><li><strong>同意撤回権：</strong>以前の処理に影響を与えずにいつでも</li></ul><p>連絡先：<a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a> — 30日以内に返答します。EUのユーザーは各国のデータ保護機関に連絡できます。トルコのユーザーは<strong>Kişisel Verileri Koruma Kurumu (KVKK)</strong>に申し立てることができます。</p>`},
{id:"pp8",h:"8. 音声データと特別カテゴリ",b:`<p>音声録音は、特定の法域（GDPRの第9条の可能性を含む）では生体データとなる場合があります。音声機能を有効にする際の明示的な同意がある場合にのみ音声データを処理します。設定でいつでも無効にできます。</p><div class="wl">音声録音は処理のためにOpenAIにリアルタイムで送信されます。音声通話を通じて機密性の高い個人情報、財務情報、または健康情報を共有しないでください。</div>`},
{id:"pp9",h:"9. 子供と未成年者",b:`<p>SYLA AIは18+のレーティングです。13歳未満（COPPA）または16歳未満（GDPR第8条）のユーザーからは意図的にデータを収集しません。未成年ユーザーを発見した場合、そのアカウントとすべてのデータを直ちに削除します。</p><p>保護者の方：お子様がアカウントを作成したと思われる場合は、<a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a>にご連絡ください。</p>`},
{id:"pp10",h:"10. データセキュリティ",b:`<ul><li>すべてのデータはTLS 1.2+を使用して転送中に暗号化</li><li>Firebaseは保存中の暗号化を提供</li><li>Firebaseへのアクセスは認証済み開発者アカウントのみに制限</li><li>アクセスログを保持</li></ul><p>お客様の権利に影響を与える侵害が発生した場合、72時間以内にお客様と関連当局に通知します（GDPR第33条）。</p>`},
{id:"pp11",h:"11. カリフォルニア州ユーザー（CCPA）",b:`<p>CCPAが定義する個人情報を販売しません。カリフォルニア州の居住者は、収集するデータを知る権利、削除を要求する権利、販売をオプトアウトする権利を有します（非該当 — データを販売していません）。連絡先：<a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></p>`},
{id:"pp12",h:"12. このポリシーの変更",b:`<p>重要な変更については、発効の少なくとも14日前にアプリ内通知でお知らせします。発効日以降の継続使用は承認とみなされます。</p>`}
]},
tos:{eye:"利用規約",title:"利用規約",secs:[
{id:"tos1",h:"1. 規約への同意",b:`<p>SYLA AIをダウンロード、インストール、または使用することにより、これらの規約に同意したものとみなされます。同意しない場合は、アプリを使用しないでください。本規約は、お客様とトルコに居住する個人開発者のギョクデニズ・チフトチ（「開発者」）との間の法的拘束力のある契約を形成します。</p>`},
{id:"tos2",h:"2. 利用資格",b:`<ul><li>18歳以上である必要があります</li><li>18歳未満のユーザーの使用は厳しく禁止されています</li><li>13歳未満のユーザーは厳しく禁止されています（COPPA）</li><li>お住まいの管轄地域で拘束力のある契約を締結する法的能力を持っている必要があります</li></ul>`},
{id:"tos3",h:"3. サービスの性質 — 治療ではありません",b:`<div class="wl">SYLA AIは感情的サポートと会話のためのAIコンパニオンです。医療機器ではなく、認可された治療やカウンセリングサービスでもなく、専門的なメンタルヘルスケアの代替でもありません。</div><ul><li>SYLA AIは医学的アドバイス、診断、または治療を提供しません</li><li>SYLA AIは治療、精神科、または心理カウンセリングの代替にはなりません</li><li>精神的な危機にある場合は、すぐに緊急サービスや専門家に連絡してください</li><li>開発者はAIとの会話に基づいて行われた決定に対して責任を負いません</li></ul><div class="hl">緊急番号：110/119（日本）· 112（EU/トルコ）· 911（米国）。全サポート地域でクライシスヘルプラインが利用可能です。</div>`},
{id:"tos4",h:"4. サブスクリプションと支払い",b:`<h3>4.1 無料プラン</h3><ul><li>新規ユーザーはアカウント作成時に30メッセージの試用を受け取ります</li><li>試用後：1日15メッセージが無料</li></ul><h3>4.2 プレミアムサブスクリプション</h3><ul><li>無制限のメッセージと追加機能</li><li>選択に応じて月次または年次で請求</li><li>確認時にApp StoreまたはGoogle Playアカウントに課金</li><li>現在の期間終了の少なくとも24時間前にキャンセルしない限り自動更新</li><li>App Store / Google Playアカウント設定からいつでもキャンセル可能</li><li>価格変更は30日前に通知</li></ul><h3>4.3 返金</h3><p>返金リクエストはAppleまたはGoogleに直接提出する必要があります。開発者は返金を直接処理しません。</p>`},
{id:"tos5",h:"5. 許容される使用",b:`<p>以下を行わないことに同意します：</p><ul><li>違法な目的でアプリを使用すること</li><li>ソースコードのリバースエンジニアリング、逆コンパイル、または抽出</li><li>ボットや自動スクリプトの使用</li><li>コンテンツモデレーションやセキュリティ対策の回避</li><li>アカウントの共有や制限を回避するための複数アカウントの作成</li><li>自分自身や他者を嫌がらせたり傷つけるためのアプリ使用</li><li>基盤となるAIモデルやトレーニングデータの複製の試み</li></ul>`},
{id:"tos6",h:"6. 責任の制限",b:`<p>適用法で許容される最大限の範囲において、開発者は以下について責任を負いません：間接的または結果的損害；AI生成コンテンツへの依存から生じる損害；AIへの感情的依存から生じる害；データ損失またはサービス中断；精神的危機時に取られた行動。</p><p>開発者の総責任は、クレームの前12ヶ月に支払った金額または100米ドルのいずれか大きい方を超えません。</p><p>EUユーザー：EUの強制的な消費者保護権は影響を受けません。</p>`},
{id:"tos7",h:"7. 知的財産",b:`<ul><li>SYLA AI、その名称、ロゴ、デザイン、および全ての独自コンテンツはギョクデニズ・チフトチの専有知的財産です</li><li>個人的・非商業的使用のための限定的、非排他的、譲渡不可のライセンスが付与されます</li><li>お客様は自身のコンテンツの所有権を保持します；アプリを使用することで、サービス提供のためにコンテンツを処理する限定的なライセンスを当方に付与します</li></ul>`},
{id:"tos8",h:"8. 解約",b:`<p>これらの規約に違反した場合、アカウントを停止または解約する権利を留保します。アプリ設定または連絡を通じていつでもアカウントを削除できます。解約後、データはプライバシーポリシーに従って削除されます。</p>`},
{id:"tos9",h:"9. 準拠法および紛争",b:`<p>本規約は<strong>トルコ共和国</strong>の法律に準拠します。紛争はまず誠実な交渉に付され、解決しない場合は、お客様の居住国の強制的な消費者保護法が別途求めない限り、<strong>トルコ・イスタンブール</strong>の裁判所に付託されます。</p><p>EUユーザー：EUの強制的な消費者保護権は影響を受けません。</p>`},
{id:"tos10",h:"10. 規約の変更",b:`<p>重要な変更は発効の少なくとも14日前にアプリ内通知で通知されます。発効日以降の継続使用は承認とみなされます。</p>`}
]},
eula:{eye:"エンドユーザーライセンス契約",title:"エンドユーザーライセンス契約",secs:[
{id:"eu1",h:"1. ライセンスの付与",b:`<p>ギョクデニズ・チフトチ（「ライセンサー」）は、お客様が所有または管理するデバイスにSYLA AIをインストールして使用するための、個人的・非商業的使用に限定した、限定的、非排他的、譲渡不可、取消可能なライセンスをお客様に付与します。</p><p>本EULAはお客様とライセンサーの間のものです。Apple, Inc.およびGoogle LLCは本契約の当事者ではありません。</p>`},
{id:"eu2",h:"2. 制限事項",b:`<ul><li>アプリケーションのコピー、変更、または派生物の作成をしないこと</li><li>アプリケーションの販売、サブライセンス、または配布をしないこと</li><li>リバースエンジニアリングや逆コンパイルをしないこと</li><li>所有権表示やマークの削除または変更をしないこと</li><li>適用法に違反してアプリケーションを使用しないこと</li><li>このライセンスを第三者に譲渡しないこと</li></ul>`},
{id:"eu3",h:"3. 年齢制限",b:`<p>アプリケーションはApple App StoreおよびGoogle Playで18+として評価されています。インストールすることで、18歳以上であることを表明します。13歳未満の者による使用は厳しく禁止されています。ライセンサーは未成年ユーザーのアカウントを即座に解約する権利を有します。</p>`},
{id:"eu4",h:"4. 医療・メンタルヘルス免責事項",b:`<div class="wl">SYLA AIはAI搭載の感情サポートコンパニオンです — 認可された医療またはメンタルヘルスサービスではありません。アプリケーション内のいかなる内容も、医学的アドバイス、心理的治療、または治療を構成しません。ライセンサーはアプリケーションのコンテンツに依存して行われた健康関連の決定について一切の責任を明示的に否認します。</div><ul><li>AI応答は不正確な場合があり、専門的なアドバイスではありません</li><li>AIへの感情的依存は固有のリスクを伴うことを認識しています</li><li>深刻なメンタルヘルスの問題がある場合は専門家の助けを求めてください</li></ul>`},
{id:"eu5",h:"5. サードパーティサービス",b:`<ul><li><strong>OpenAI</strong> — AI処理: <a href="https://openai.com/policies" target="_blank">openai.com/policies</a></li><li><strong>Google Firebase</strong> — 認証・データベース: <a href="https://firebase.google.com/terms" target="_blank">firebase.google.com/terms</a></li><li><strong>RevenueCat</strong> — サブスクリプション: <a href="https://www.revenuecat.com/privacy" target="_blank">revenuecat.com/privacy</a></li><li><strong>Apple / Google Play</strong> — プラットフォーム配信規約が適用されます</li></ul>`},
{id:"eu6",h:"6. 知的財産の所有権",b:`<p>全てのコード、デザイン、ブランド、AIシステム、および独自コンテンツ（ユーザー生成コンテンツを除く）はギョクデニズ・チフトチの専有財産です。明示的に付与されていない全ての権利は留保されます。</p>`},
{id:"eu7",h:"7. 保証の否認",b:`<p>アプリケーションは「現状のまま」かつ「利用可能な状態で」、いかなる種類の保証もなく提供されます。ライセンサーは商品性、特定目的への適合性、および非侵害を含む全ての保証を否認します。AI生成コンテンツは不正確な場合があります；自己責任でご使用ください。</p>`},
{id:"eu8",h:"8. Apple固有の条項",b:`<ul><li>本EULAはお客様とライセンサーの間のものです — Appleとの間ではありません</li><li>Appleはアプリケーションのメンテナンスやサポートを提供する義務を負いません</li><li>Appleはアプリケーションに関するクレームへの対応に責任を負いません</li><li>IP侵害クレームの場合、Appleは責任を負いません</li><li>AppleおよびAppleの子会社は第三者受益者であり、本EULAをお客様に対して執行できます</li></ul>`},
{id:"eu9",h:"9. Google Play固有の条項",b:`<ul><li>本EULAはお客様とライセンサーの間のものです — Google LLCとの間ではありません</li><li>Googleはアプリケーションまたはそのコンテンツに対して責任を負いません</li><li>アプリケーションはGoogle Playデベロッパープログラムポリシーに準拠しています</li></ul>`},
{id:"eu10",h:"10. 解約",b:`<p>いずれかの条項に違反した場合、このライセンスは自動的に終了します。解約後は全使用を停止し全コピーを削除してください。ライセンサーは違反を理由にいつでもライセンスを終了できます。</p>`},
{id:"eu11",h:"11. 準拠法",b:`<p>本EULAはトルコ共和国の法律に準拠します。紛争は、お客様の国の消費者保護法が別途要求しない限り、イスタンブール、トルコの裁判所の専属管轄に服します。</p>`},
{id:"eu12",h:"12. 分離可能性",b:`<p>本EULAのいずれかの条項が管轄裁判所によって無効、違法、または執行不能とみなされた場合、残りの条項は完全に効力を持ち続けます。無効とされた条項は、元の意図を最も忠実に反映する有効な条項に置き換えられます。</p>`},

const dkeys=['pp','tos','eula'];
let cl='en', cd='pp';

function render(){
  const L=C[cl]||C.en;
  document.querySelectorAll('.tabs button').forEach((b,i)=>{
    b.querySelector('span').textContent=L.tabs[i]||'';
  });
  const main=document.getElementById('CT');
  main.innerHTML='';
  dkeys.forEach(dk=>{
    const D=L[dk];
    const div=document.createElement('div');
    div.className='panel'+(dk===cd?' on':'');
    div.id='doc-'+dk;
    let html=`<div class="hero"><div class="eye">${D.eye}</div><h1 class="htitle">${D.title}</h1><div class="meta"><span>📅 ${L.eff}</span><span>🔄 ${L.upd}</span><span>📍 Türkiye</span></div></div>`;
    D.secs.forEach(s=>{
      html+=`<div class="sec" id="${dk}-${s.id}"><h2>${s.h}</h2>${s.b}</div>`;
    });
    html+=`<div class="ft">SYLA AI · Gökdeniz Çiftçi · Türkiye · <a href="mailto:gokdenizciftciq@icloud.com">gokdenizciftciq@icloud.com</a></div>`;
    div.innerHTML=html;
    main.appendChild(div);
  });
  renderSidebar();
}

function renderSidebar(){
  const L=C[cl]||C.en;
  const D=L[cd];
  const sb=document.getElementById('SD');
  sb.innerHTML='';
  const lbl=document.createElement('div');
  lbl.className='slbl';
  lbl.textContent=D.eye;
  sb.appendChild(lbl);
  D.secs.forEach(s=>{
    const a=document.createElement('div');
    a.className='sln';
    a.textContent=s.h;
    a.onclick=()=>{
      const el=document.getElementById(cd+'-'+s.id);
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    };
    sb.appendChild(a);
  });
}

function setL(l){
  cl=l;
  document.querySelectorAll('.lb button').forEach(b=>b.classList.toggle('on',b.textContent.trim().toLowerCase()===l));
  render();
}

function setD(d){
  cd=d;
  document.querySelectorAll('.tabs button').forEach((b,i)=>b.classList.toggle('on',dkeys[i]===d));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id==='doc-'+d));
  renderSidebar();
}

render();
</script>
